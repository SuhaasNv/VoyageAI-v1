# ─────────────────────────────────────────────────────────────────────────────
#  VoyageAI — Local Development Stack
#
#  Services:
#    app         — Next.js (dev server on :3000)
#    langgraph   — Python LangGraph orchestration service (:8000)
#    db          — PostgreSQL 16 (:5432)
#
#  Quick start:
#    cp .env.docker .env.local          # only needed once
#    docker compose up                  # starts all three services
#    docker compose up langgraph        # start only the Python service
#    docker compose up --build langgraph  # rebuild after code changes
#
#  Tear down (keeps the db volume):
#    docker compose down
#
#  Tear down + wipe the database:
#    docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Next.js App ─────────────────────────────────────────────────────────────
  # Runs the Next.js dev server with hot-reload. Mounts the workspace so code
  # changes are reflected instantly without rebuilding the image.
  #
  # For production: replace `command` with `npm run build && npm run start`
  # and switch to the standalone Dockerfile (see CLAUDE.md deploy section).
  app:
    build:
      context: .
      dockerfile: Dockerfile.app # create this when you want a prod image
      target: deps # only install deps layer in dev
    image: voyageai-app:dev
    restart: unless-stopped
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      # Mount workspace for hot-reload; exclude node_modules and build output
      - .:/workspace
      - /workspace/node_modules
      - /workspace/.next
    working_dir: /workspace
    environment:
      NODE_ENV: development
      # ── Database ────────────────────────────────────────────────────────────
      DATABASE_URL: postgresql://voyageai:voyageai_dev@db:5432/voyageai
      DIRECT_URL: postgresql://voyageai:voyageai_dev@db:5432/voyageai
      # ── Auth ────────────────────────────────────────────────────────────────
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      # ── LLM ─────────────────────────────────────────────────────────────────
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      # ── LangGraph sidecar ───────────────────────────────────────────────────
      LANGGRAPH_SERVICE_URL: http://langgraph:8000
      INTERNAL_AGENT_SECRET: ${INTERNAL_AGENT_SECRET:-dev-agent-secret-change-in-prod}
      # ── OAuth ───────────────────────────────────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # ── Optional ────────────────────────────────────────────────────────────
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy
    # Run Prisma migrations automatically on startup
    # Remove `migrate deploy` if you prefer to run migrations manually
    entrypoint: >
      sh -c "
        npx prisma migrate deploy &&
        npm run dev
      "

  # ── LangGraph Orchestration Service ─────────────────────────────────────────
  # Python FastAPI + LangGraph. Calls back to `app` via the internal agent API.
  #
  # The service is intentionally kept as a sidecar: it has no database of its
  # own and no LLM API keys. All state lives in the Next.js layer.
  langgraph:
    build:
      context: ./python/agent_graph
      dockerfile: Dockerfile
    image: voyageai-langgraph:dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # URL of the Next.js app — must use the docker-compose service name
      NEXT_INTERNAL_URL: http://app:3000
      # Shared secret — must match INTERNAL_AGENT_SECRET in the app service
      INTERNAL_AGENT_SECRET: ${INTERNAL_AGENT_SECRET:-dev-agent-secret-change-in-prod}
      # Optional: override the port (default 8000 matches EXPOSE in Dockerfile)
      LANGGRAPH_PORT: "8000"
      WORKERS: "1"
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Hot-reload: mount the Python source so file changes don't require a rebuild
    # Comment this out for a fully isolated build (recommended in staging/prod)
    volumes:
      - ./python/agent_graph:/app:ro
volumes:
  pgdata:
    driver: local
