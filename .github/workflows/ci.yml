name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  # Mock environment variables for Prisma and Next.js build validation
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/voyageai_ci"
  DIRECT_URL: "postgresql://ci:ci@localhost:5432/voyageai_ci"
  JWT_ACCESS_SECRET: "ci-jwt-access-secret-at-least-32-characters-long"
  JWT_REFRESH_SECRET: "ci-jwt-refresh-secret-at-least-32-characters-long"
  CSRF_SECRET: "ci-csrf-secret-at-least-32-characters-long-ok"
  LLM_PROVIDER: "mock"
  UPSTASH_REDIS_REST_URL: "https://ci.upstash.io"
  UPSTASH_REDIS_REST_TOKEN: "ci-token"
  NEXT_PUBLIC_MAPBOX_TOKEN: "ci-mapbox-token"

jobs:
  pipeline:
    name: Production Validation Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is required for accurate secret scanning

      - name: 2. Security scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: 4. Install dependencies
        run: npm ci

      - name: 5. Generate Prisma Client
        run: npx prisma generate

      - name: 6. Prisma schema validation
        run: npx prisma validate

      - name: 7. TypeScript type check
        run: npx tsc --noEmit

      - name: 8. ESLint validation
        run: npm run lint

      - name: 9. Circular dependency detection
        run: npx madge --circular --extensions ts,tsx src/

      - name: 10. Next.js production build
        run: npm run build
