name: CI — VoyageAI MLOps Pipeline

# ─────────────────────────────────────────────────────────────────────────────
#  Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push Docker image to DOCR even on non-main branch"
        required: false
        default: "false"
        type: boolean
      ignore_test_failures:
        description: "Bypass quality gate — allow build/push even if tests, SAST, or validations fail (emergency only)"
        required: false
        default: "false"
        type: boolean
      skip_deploy:
        description: "Skip push-to-DOCR and DAST (build and scan only)"
        required: false
        default: "false"
        type: boolean
      skip_tests:
        description: "Skip all test and validation stages (4–12) and go straight to quality gate and build"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
#  Shared environment
#  LLM_PROVIDER=mock  → zero real API calls in CI.
#  SKIP_ENV_VALIDATION → bypasses production-only boot-time secret checks.
#
#  Railway (Postgres + Redis):
#    Set repo secrets DATABASE_URL, DIRECT_URL, REDIS_URL to your Railway
#    service variables (same strings as in Railway dashboard). When unset,
#    DATABASE_URL/DIRECT_URL fall back to a local placeholder so fork PRs
#    without secrets can still run lint-only paths (jobs that need DB may fail).
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  SKIP_ENV_VALIDATION: "1"
  LLM_PROVIDER: "mock"
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/voyageai_ci' }}
  DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/voyageai_ci' }}
  REDIS_URL: ${{ secrets.REDIS_URL || '' }}
  JWT_ACCESS_SECRET: "ci-jwt-access-secret-at-least-32-characters-long"
  JWT_REFRESH_SECRET: "ci-jwt-refresh-secret-at-least-32-characters-long"
  CSRF_SECRET: "ci-csrf-secret-at-least-32-characters-long-ok"
  NEXT_PUBLIC_MAPBOX_TOKEN: "ci-mapbox-token"
  # Docker / DOCR
  IMAGE_NAME: voyageai-langgraph
  NEXTJS_IMAGE_NAME: voyageai-nextjs
  PYTHON_VERSION: "3.11"
  # Registry slug — must match Terraform (default voyageai-docr unless REGISTRY_NAME / DO_REGISTRY_NAME is set).
  DOCR_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME || vars.REGISTRY_NAME || 'voyageai-docr' }}
  # Default username "token" + PAT matches DO `docker login -u token` (avoids 401 if email unset or wrong account).
  DOCR_DOCKER_USERNAME: ${{ secrets.DIGITALOCEAN_REGISTRY_USER || vars.DIGITALOCEAN_EMAIL || 'token' }}

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
#  Pipeline order (each stage's "needs" enforces the sequence):
#
#   1 secret-scan  ──────────────────────────────────────────────────────┐
#   2 lint          ← secret-scan                                        │
#   3 build         ← lint                                               │
#   4 unittest      ← build           ┐                                 │
#   5 sast          ← lint            │  All must pass — if ANY of      │
#   6 sca           ← build           │  stages 4–12 fail, the          │
#   7 data-validation   ← build       │  quality-gate job fails and      │
#   8 model-validation  ← build       │  stages 13–16 are blocked.      │
#   9 prompt-validation ← model-val   │                                 │
#  10 prompt-tests  ← [4, 9]          │                                 │
#  11 safety-tests  ← [4, 9]          │                                 │
#  12 evaluation    ← [10, 11]        ┘                                 │
#        │                                                               │
#   quality-gate ← [4,5,6,7,12]  ◄── single blocking aggregator ────────┘
#        │
#  13 build-image   ← quality-gate  (Docker — LangGraph Python service)
#                                │
#  14 trivy-scan    ← build-image  (CVE gate, secret scan, misconfig scan)
#                                │
#              ┌─────────────────┴──────────────────┐
#  15 push-to-docr  ← trivy-scan  (main only)        │
#  16 dast          ← trivy-scan  (main only)  ──────┘
#
#  Required secrets for stages 15–16:
#    DIGITALOCEAN_ACCESS_TOKEN  — DO API token (write:registry; rotate on 401 from registry auth)
#    DIGITALOCEAN_EMAIL         — Optional — DO account email for docker login; if unset, workflows use username "token" + PAT
#    DO_REGISTRY_NAME           — registry slug (overrides vars.REGISTRY_NAME; default voyageai-docr)
#    PRODUCTION_URL             — public Railway app URL for DAST (main only), e.g. https://xxx.up.railway.app
#
#  workflow_dispatch inputs:
#    force_push           — push to DOCR even on non-main branch
#    ignore_test_failures — bypass quality gate on test/SAST/validation failure (emergency)
#    skip_deploy          — run build + scan only; skip push-to-DOCR and DAST
#    skip_tests           — skip stages 4–12 entirely; go straight to quality gate + build
#
#  Recommended (Railway — used by jobs that touch DB/Redis):
#    DATABASE_URL, DIRECT_URL, REDIS_URL
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  1. SECRET SCAN — Block the entire pipeline if secrets are committed
  #
  #  Uses GitHub's native secret scanning push protection API to check every
  #  commit in this push for known secret patterns (tokens, API keys, certs).
  #
  #  How it works:
  #    • GitHub Advanced Security scans all commits server-side automatically.
  #    • This job calls the GitHub API to read any open secret-scanning alerts
  #      for the current repo and fails the pipeline if any are active.
  #    • A second step runs a regex sweep for project-specific patterns
  #      (OpenAI keys, Gemini keys, DO tokens) that may not yet be in GitHub's
  #      built-in pattern library.
  #
  #  Requires:
  #    • GitHub Advanced Security enabled on the repo
  #      (free for public repos; included in GitHub Enterprise for private repos)
  #    • Repository secret-scanning enabled:
  #        Settings → Security → Code security → Secret scanning → Enable
  # ══════════════════════════════════════════════════════════════════════════
  secret-scan:
    name: "1 · Secret Scan (GitHub Secret Scanning)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Needed to read/write secret scanning alerts

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so every commit in the push is checked

      # ── Step 1: GitHub Secret Scanning alert check ────────────────────────
      # Queries the GitHub Secret Scanning API for any open (unresolved) alerts.
      # Fails the pipeline if any active secrets are detected in the repo.
      - name: GitHub Secret Scanning — check for open alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Querying GitHub Secret Scanning API for open alerts..."

          ALERTS=$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/secret-scanning/alerts?state=open&per_page=100" \
            2>&1) || true

          # If the API returns a 404 it means Secret Scanning is not enabled —
          # warn but don't block so the repo can still be set up.
          if echo "$ALERTS" | grep -q '"message": "Secret scanning is disabled"' || \
             echo "$ALERTS" | grep -q "404"; then
            echo "::warning::GitHub Secret Scanning is not enabled on this repository."
            echo "Enable it at: Settings → Security → Code security → Secret scanning"
            exit 0
          fi

          COUNT=$(echo "$ALERTS" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{
              try {
                const a = JSON.parse(d);
                if (!Array.isArray(a)) { console.log(0); return; }
                console.log(a.length);
                if (a.length > 0) {
                  a.forEach(al => process.stderr.write(
                    '  [' + al.secret_type_display_name + '] ' + al.html_url + '\n'
                  ));
                }
              } catch(e) { console.log(0); }
            });
          " 2>&1) || COUNT=0

          # Separate the count from any alert lines printed to stderr
          OPEN_COUNT=$(echo "$COUNT" | head -1 | tr -d '[:space:]')

          if [ "$OPEN_COUNT" -gt 0 ] 2>/dev/null; then
            echo "::error::GitHub Secret Scanning found ${OPEN_COUNT} open secret alert(s)."
            echo "Resolve all alerts at: ${{ github.server_url }}/${{ github.repository }}/security/secret-scanning"
            echo "$COUNT"
            exit 1
          fi

          echo "✅ GitHub Secret Scanning: no open alerts found."

      # ── Step 2: Commit-range regex sweep (project-specific patterns) ──────
      # Scans the files changed in this push for secret patterns that may not
      # yet be in GitHub's built-in library (e.g. custom API key formats).
      - name: Regex sweep — project-specific secret patterns
        run: |
          echo "Scanning changed files for hardcoded secrets..."

          # Determine which files changed in this push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -E '\.(ts|tsx|js|jsx|py|env|json|yaml|yml)$' || true)
          else
            FILES=$(git diff --name-only HEAD~1 HEAD \
              | grep -E '\.(ts|tsx|js|jsx|py|env|json|yaml|yml)$' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "No relevant files changed — skip."
            exit 0
          fi

          FOUND=0
          # OpenAI API key
          PATTERN_OAI="sk-[a-zA-Z0-9_-]{32,}"
          # Google / Gemini API key
          PATTERN_GEM="AIza[0-9A-Za-z_-]{35}"
          # GitHub tokens (PAT, app, installation)
          PATTERN_GH="(ghp|ghs|gho|github_pat)_[a-zA-Z0-9]{36,}"
          # DigitalOcean personal access token (64 hex chars)
          PATTERN_DO="dop_v1_[a-f0-9]{64}"
          # Stripe live key
          PATTERN_STRIPE="sk_live_[a-zA-Z0-9]{24,}"
          # Generic high-entropy assignments (var = "long_alphanum")
          PATTERN_GENERIC="(SECRET|TOKEN|API_KEY|PRIVATE_KEY)\s*=\s*['\"][a-zA-Z0-9+/]{32,}['\"]"

          ALL_PATTERNS="${PATTERN_OAI}|${PATTERN_GEM}|${PATTERN_GH}|${PATTERN_DO}|${PATTERN_STRIPE}|${PATTERN_GENERIC}"

          while IFS= read -r FILE; do
            [ -f "$FILE" ] || continue
            MATCHES=$(grep -nE "$ALL_PATTERNS" "$FILE" \
              | grep -v "^#" \
              | grep -v "change-me" \
              | grep -v "ci-.*secret" \
              | grep -v "example" \
              | grep -v "placeholder" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error file=${FILE}::Potential hardcoded secret detected:"
              echo "$MATCHES" | while read -r LINE; do
                echo "  ${FILE}: ${LINE}"
              done
              FOUND=1
            fi
          done <<< "$FILES"

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Hardcoded secrets detected. Rotate any exposed keys and remove them from source."
            exit 1
          fi
          echo "✅ Regex sweep: no hardcoded secrets found in changed files."

      - name: Write secret scan summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          ALERTS_URL="${{ github.server_url }}/${{ github.repository }}/security/secret-scanning"
          {
            echo "## ${ICON} Secret Scan — ${STATUS^}"
            echo ""
            echo "| Check | Method |"
            echo "|-------|--------|"
            echo "| Open alert check | GitHub Secret Scanning API |"
            echo "| Commit sweep | Regex (OpenAI, Gemini, DO, GH, Stripe patterns) |"
            echo ""
            echo "> All secret scanning alerts: [Security tab](${ALERTS_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════
  #  2. LINT — TypeScript type-check + ESLint + circular dependency check
  # ══════════════════════════════════════════════════════════════════════════
  lint:
    name: "2 · Lint"
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: TypeScript — type check (no emit)
        run: npx tsc --noEmit

      - name: ESLint — code quality + security rules
        run: npm run lint

      - name: Circular dependency detection
        # Circular imports cause subtle runtime errors in Next.js App Router.
        run: npx madge --circular --extensions ts,tsx src/

  # ══════════════════════════════════════════════════════════════════════════
  #  3. BUILD — Next.js production build + Prisma artefact
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "3 · Build (app + model)"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate

      - name: Next.js production build
        run: npm run build

      - name: Upload .next artefact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/
            !.next/cache
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  #  4. UNIT TESTS — Vitest with coverage
  # ══════════════════════════════════════════════════════════════════════════
  unittest:
    name: "4 · Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Vitest — unit + integration tests
        run: npm test -- --reporter=verbose --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  5. SAST — CodeQL static security analysis
  #  Runs in parallel with build/tests; only depends on lint passing.
  # ══════════════════════════════════════════════════════════════════════════
  sast:
    name: "5 · SAST (CodeQL)"
    needs: lint
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-extended covers OWASP Top 10 + common Next.js/Node.js patterns
          queries: security-extended
          config: |
            paths-ignore:
              - node_modules
              - .next
              - prisma/migrations

      - uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
          # Always upload so results appear in the Security tab, not just on failure
          upload: always

  # ══════════════════════════════════════════════════════════════════════════
  #  6. SCA — Dependency vulnerability scan + SBOM
  # ══════════════════════════════════════════════════════════════════════════
  sca:
    name: "6 · SCA (dependencies)"
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: npm audit — fail on high/critical
        run: npm audit --audit-level=high --json > npm-audit.json || true

      - name: Parse and gate on audit results
        run: |
          node -e "
            const r = require('./npm-audit.json');
            const v = r.metadata?.vulnerabilities ?? {};
            const critical = v.critical ?? 0;
            const high = v.high ?? 0;
            console.log('Vulnerabilities → critical:', critical, '| high:', high, '| moderate:', v.moderate ?? 0);
            if (critical > 0 || high > 0) {
              console.error('Pipeline blocked: high/critical vulnerabilities found.');
              process.exit(1);
            }
            console.log('SCA gate passed.');
          "

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-${{ github.sha }}
          path: npm-audit.json
          retention-days: 14

      - name: Generate SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  #  7. DATA VALIDATION — Zod schemas + agent pipeline contract fixtures
  # ══════════════════════════════════════════════════════════════════════════
  data-validation:
    name: "7 · Data Validation"
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run data validation script
        run: npx tsx scripts/ci/validate-data.ts

      - name: Upload data validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-validation-${{ github.sha }}
          path: reports/data-validation.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  8. MODEL VALIDATION — Deterministic agent logic + output contracts
  # ══════════════════════════════════════════════════════════════════════════
  model-validation:
    name: "8 · Model Validation"
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run model validation script
        run: npx tsx scripts/ci/validate-model.ts

      - name: Upload model validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-validation-${{ github.sha }}
          path: reports/model-validation.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  9. PROMPT VALIDATION — Structural contract check for all agent prompts
  #
  #  Different from prompt-tests (stage 10):
  #   • prompt-validation  → static contracts  (prompt present, tokens exist,
  #                          format consistent, no injection vectors in templates)
  #   • prompt-tests       → runtime behaviour (mock LLM output parsing,
  #                          JSON extraction strategies, repair path)
  # ══════════════════════════════════════════════════════════════════════════
  prompt-validation:
    name: "9 · Prompt Validation"
    needs: model-validation
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run prompt validation script
        run: npx tsx scripts/ci/validate-prompts.ts

      - name: Upload prompt validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-validation-${{ github.sha }}
          path: reports/prompt-validation.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  10. PROMPT TESTS — Runtime mock-LLM output parsing + repair path
  # ══════════════════════════════════════════════════════════════════════════
  prompt-tests:
    name: "10 · Prompt Tests"
    needs: [unittest, prompt-validation]
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run prompt tests
        run: npx tsx scripts/ci/prompt-tests.ts

      - name: Upload prompt test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-tests-${{ github.sha }}
          path: reports/prompt-tests.json
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  #  11. SAFETY TESTS — Toxicity, jailbreak, PII, budget/risk guards
  # ══════════════════════════════════════════════════════════════════════════
  safety-tests:
    name: "11 · Safety Tests (toxicity, jailbreak)"
    needs: [unittest, prompt-validation]
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Run safety tests
        run: npx tsx scripts/ci/safety-tests.ts

      - name: Upload safety test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-tests-${{ github.sha }}
          path: reports/safety-tests.json
          retention-days: 14

  # ══════════════════════════════════════════════════════════════════════════
  #  12. EVALUATION — Aggregate offline metrics + quality gate
  # ══════════════════════════════════════════════════════════════════════════
  evaluation:
    name: "12 · Evaluation (offline metrics)"
    needs: [prompt-tests, safety-tests]
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/

      - name: Download prompt validation report
        uses: actions/download-artifact@v4
        with:
          name: prompt-validation-${{ github.sha }}
          path: reports/

      - name: Download prompt test report
        uses: actions/download-artifact@v4
        with:
          name: prompt-tests-${{ github.sha }}
          path: reports/

      - name: Download safety test report
        uses: actions/download-artifact@v4
        with:
          name: safety-tests-${{ github.sha }}
          path: reports/

      - name: Run offline evaluation
        run: npx tsx scripts/ci/evaluate.ts

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-${{ github.sha }}
          path: reports/evaluation.json
          retention-days: 30

      - name: Write pipeline summary to GitHub
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const ev = JSON.parse(fs.readFileSync('reports/evaluation.json', 'utf8'));
            const rows = ev.metrics.map(m =>
              '| ' + [m.name, m.value + (m.unit ?? ''), m.threshold + (m.unit ?? ''), m.passed ? '✅' : '❌'].join(' | ') + ' |'
            ).join('\n');
            const body = [
              '## 🧪 Pipeline Evaluation — ' + (ev.passed ? '✅ PASSED' : '❌ FAILED'),
              '',
              '| Metric | Value | Threshold | Status |',
              '|--------|-------|-----------|--------|',
              rows,
              '',
              '**Commit:** \`${{ github.sha }}\`  |  **Branch:** \`${{ github.ref_name }}\`',
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body + '\n');
          "

      - name: Gate — fail pipeline if evaluation did not pass
        run: |
          node -e "
            const ev = require('./reports/evaluation.json');
            if (!ev.passed) {
              console.error('Evaluation gate failed:', ev.metrics.filter(m => !m.passed).map(m => m.name).join(', '));
              process.exit(1);
            }
            console.log('All quality gates passed.');
          "

  # ══════════════════════════════════════════════════════════════════════════
  #  QUALITY GATE — single aggregating blocker for stages 13–16
  #
  #  WHY THIS EXISTS:
  #    Stages 5 (sast), 6 (sca), and 7 (data-validation) run in parallel with
  #    the main evaluation chain. They have NO downstream dependents, so if any
  #    of them fail the `evaluation` job still completes and build-image runs.
  #
  #    This job collects every quality check (4–12) into one place.
  #    If ANY of them failed or was skipped due to an upstream failure,
  #    this job fails and stages 13–16 are blocked.
  #
  #  Covered checks:
  #    unittest (4)       — at least one test must pass
  #    sast (5)           — CodeQL must find no security issues
  #    sca (6)            — no high/critical dependency CVEs
  #    data-validation (7)— Zod schemas + agent contracts intact
  #    evaluation (12)    — covers 8, 9, 10, 11 transitively
  # ══════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "✅ Quality Gate (all checks)"
    needs: [unittest, sast, sca, data-validation, evaluation]
    runs-on: ubuntu-latest
    # Runs when all needs completed (any result) so we can inspect them ourselves.
    # When ignore_test_failures=true we pass regardless; otherwise we require
    # all upstream jobs to have succeeded.
    if: always()

    steps:
      - name: Evaluate gate
        run: |
          IGNORE="${{ github.event.inputs.ignore_test_failures }}"

          UNITTEST="${{ needs.unittest.result }}"
          SAST="${{ needs.sast.result }}"
          SCA="${{ needs.sca.result }}"
          DATA="${{ needs.data-validation.result }}"
          EVAL="${{ needs.evaluation.result }}"

          FAILED=0
          for JOB in "$UNITTEST" "$SAST" "$SCA" "$DATA" "$EVAL"; do
            if [ "$JOB" != "success" ] && [ "$JOB" != "skipped" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ] && [ "$IGNORE" != "true" ]; then
            echo "::error::Quality gate FAILED — one or more upstream checks did not pass."
            echo "To bypass in an emergency, re-run with ignore_test_failures=true."
            exit 1
          fi

          {
            if [ "$IGNORE" = "true" ] && [ "$FAILED" = "1" ]; then
              echo "## ⚠️ Quality Gate — BYPASSED (ignore_test_failures=true)"
              echo ""
              echo "> **Warning:** test failures were ignored by manual override."
            else
              echo "## ✅ Quality Gate — All Checks Passed"
            fi
            echo ""
            echo "| Check | Stage | Result |"
            echo "|-------|-------|--------|"
            echo "| Unit Tests         | 4  | $( [ "$UNITTEST" = "success" ] && echo '✅' || echo '⚠️' ) ${UNITTEST} |"
            echo "| SAST (CodeQL)      | 5  | $( [ "$SAST"     = "success" ] && echo '✅' || echo '⚠️' ) ${SAST} |"
            echo "| SCA (deps CVE)     | 6  | $( [ "$SCA"      = "success" ] && echo '✅' || echo '⚠️' ) ${SCA} |"
            echo "| Data Validation    | 7  | $( [ "$DATA"     = "success" ] && echo '✅' || echo '⚠️' ) ${DATA} |"
            echo "| Evaluation         | 12 | $( [ "$EVAL"     = "success" ] && echo '✅' || echo '⚠️' ) ${EVAL} |"
            echo ""
            echo "> Pipeline cleared for Docker build and delivery stages."
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════
  #  13. BUILD DOCKER IMAGE
  #      Builds the multi-stage LangGraph Dockerfile and exports it as an OCI
  #      tarball so Trivy can scan it without touching a registry.
  #      Only runs after ALL quality gates pass (via quality-gate aggregator).
  # ══════════════════════════════════════════════════════════════════════════
  build-image:
    name: "13 · Build Docker Image (LangGraph)"
    needs: quality-gate
    runs-on: ubuntu-latest
    # always() breaks the cascading-skip caused by transitive failures upstream.
    # The second condition ensures we only run when the gate actually passed.
    if: always() && needs.quality-gate.result == 'success'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (cache-backed) and export tarball
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./python/agent_graph
          file: ./python/agent_graph/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/langgraph-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: langgraph-image-${{ github.sha }}
          path: /tmp/langgraph-image.tar
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  #  14. TRIVY — CONTAINER VULNERABILITY SCAN
  #      Four scans on the built tarball:
  #        • SARIF report (all severities) → GitHub Security tab
  #        • CRITICAL CVE gate             → blocks pipeline
  #        • HIGH CVE scan                 → warning only, non-blocking
  #        • Secret scan inside image      → blocks pipeline
  #        • Dockerfile misconfig scan     → blocks on CRITICAL/HIGH
  # ══════════════════════════════════════════════════════════════════════════
  trivy-scan:
    name: "14 · Trivy — Container Vulnerability Scan"
    needs: build-image
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-image.result == 'success' &&
      github.event.inputs.skip_tests != 'true'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: langgraph-image-${{ github.sha }}
          path: /tmp/

      - name: Load image into Docker daemon
        run: docker load --input /tmp/langgraph-image.tar

      - name: Trivy — SARIF report (all severities → Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,config"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
        continue-on-error: true

      - name: Trivy — gate on CRITICAL CVEs (blocks pipeline)
        # Non-blocking when skip_tests or ignore_test_failures is active
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}

      - name: Trivy — warn on HIGH CVEs (non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          severity: HIGH
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"

      - name: Trivy — secret scan inside image filesystem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          scanners: "secret"
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}

      - name: Trivy — Dockerfile misconfig scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./python/agent_graph
          format: table
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ github.sha }}
          path: trivy-results.sarif
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  #  15. PUSH TO DIGITALOCEAN CONTAINER REGISTRY
  #      Runs only on main (or when force_push=true via workflow_dispatch).
  #      Re-builds with registry tags using the BuildKit GHA layer cache
  #      (fast — all layers already cached from stage 13).
  #      Attaches SLSA provenance + CycloneDX SBOM to the image manifest.
  #
  #  Required secrets:
#    DIGITALOCEAN_ACCESS_TOKEN  — DO personal access token (write:registry)
#    DIGITALOCEAN_EMAIL         — Optional — DO login email for DOCR; else username "token" + PAT
  #    DO_REGISTRY_NAME           — registry slug (overrides vars; default voyageai-docr)
  # ══════════════════════════════════════════════════════════════════════════
  push-to-docr:
    name: "15 · Push to DigitalOcean Container Registry"
    needs: [build-image, trivy-scan]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-image.result == 'success' &&
      (needs.trivy-scan.result == 'success' || needs.trivy-scan.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.event.inputs.force_push == 'true') &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true'
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ env.DOCR_DOCKER_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Compute registry image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push to DOCR (layers cached from stage 13)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./python/agent_graph
          file: ./python/agent_graph/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy — verify pushed image in registry
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}
        env:
          TRIVY_USERNAME: ${{ env.DOCR_DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Write push summary
        run: |
          {
            echo "## 🐳 Container Push — ✅ Published"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}\` |"
            echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |"
            echo "| **Tags** | \`latest\`, \`sha-$(echo ${{ github.sha }} | head -c7)\`, \`${{ github.run_number }}\` |"
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Actor** | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════
  #  13b. BUILD NEXT.JS DOCKER IMAGE
  #       Builds the production Next.js image from Dockerfile.app using
  #       Next.js standalone output.  Runs in parallel with build-image (13).
  # ══════════════════════════════════════════════════════════════════════════
  build-nextjs:
    name: "13b · Build Next.js Docker Image"
    needs: quality-gate
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.quality-gate.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Next.js image and export tarball
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: false
          tags: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          outputs: type=docker,dest=/tmp/nextjs-image.tar
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ env.NEXT_PUBLIC_MAPBOX_TOKEN }}
            DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://prisma:prisma@127.0.0.1:5432/prisma' }}

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-image-${{ github.sha }}
          path: /tmp/nextjs-image.tar
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  #  14b. TRIVY SCAN — NEXT.JS IMAGE
  #       Security scan of the Next.js Docker image.
  #       Runs in parallel with trivy-scan (14).
  # ══════════════════════════════════════════════════════════════════════════
  trivy-scan-nextjs:
    name: "14b · Trivy — Next.js Image Security Scan"
    needs: build-nextjs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Next.js image tarball
        uses: actions/download-artifact@v4
        with:
          name: nextjs-image-${{ github.sha }}
          path: /tmp/

      - name: Load image into Docker daemon
        run: docker load --input /tmp/nextjs-image.tar

      - name: Trivy — SARIF (all severities → Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: sarif
          output: trivy-nextjs.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,config"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-nextjs.sarif
          category: trivy-nextjs
        continue-on-error: true

      - name: Trivy — gate on CRITICAL CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}

      - name: Trivy — warn on HIGH CVEs (non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: HIGH
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"

      - name: Trivy — secret scan inside image filesystem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          scanners: "secret"
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}

      - name: Trivy — Dockerfile misconfig scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          config: Dockerfile.app
          format: table
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy Next.js SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-nextjs-results-${{ github.sha }}
          path: trivy-nextjs.sarif
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════════
  #  15b. PUSH NEXT.JS TO DIGITALOCEAN CONTAINER REGISTRY
  #       Runs only on main (or when force_push=true via workflow_dispatch).
  #       Re-builds with DOCR registry tags using the GHA layer cache.
  #
  #  Required secrets:
#    DIGITALOCEAN_ACCESS_TOKEN  — DO personal access token (write:registry)
#    DIGITALOCEAN_EMAIL         — Optional — DO login email for DOCR; else username "token" + PAT
  #    DO_REGISTRY_NAME           — registry slug (overrides vars; default voyageai-docr)
  # ══════════════════════════════════════════════════════════════════════════
  push-nextjs-to-docr:
    name: "15b · Push Next.js to DigitalOcean Container Registry"
    needs: [build-nextjs, trivy-scan-nextjs]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-nextjs.result == 'success' &&
      (needs.trivy-scan-nextjs.result == 'success' || needs.trivy-scan-nextjs.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.event.inputs.force_push == 'true') &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true'
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ env.DOCR_DOCKER_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Compute registry image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.NEXTJS_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Next.js to DOCR (layers cached from stage 13b)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs
          provenance: true
          sbom: true
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN || env.NEXT_PUBLIC_MAPBOX_TOKEN }}
            DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://prisma:prisma@127.0.0.1:5432/prisma' }}

      - name: Trivy — verify pushed Next.js image in registry
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: ${{ (github.event.inputs.skip_tests == 'true' || github.event.inputs.ignore_test_failures == 'true') && '0' || '1' }}
        env:
          TRIVY_USERNAME: ${{ env.DOCR_DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Write Next.js push summary
        run: |
          {
            echo "## 🐳 Next.js Container Push — ✅ Published"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}\` |"
            echo "| **Image** | \`${{ env.NEXTJS_IMAGE_NAME }}\` |"
            echo "| **Tags** | \`latest\`, \`sha-$(echo ${{ github.sha }} | head -c7)\`, \`${{ github.run_number }}\` |"
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Actor** | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════
  #  16. DAST — OWASP ZAP FULL SCAN
  #      Dynamic Application Security Testing against the live staging URL.
  #      Runs in parallel with push-to-docr (both gate on trivy-scan).
  #      Catches runtime issues that static analysis cannot:
  #        • Missing security headers (CSP, HSTS, X-Frame-Options)
  #        • Insecure cookies / session fixation
  #        • CORS misconfiguration
  #        • Open redirects + injection surfaces
  #        • Information disclosure in error responses
  #
  #  Required secret:
  #    PRODUCTION_URL — public Railway HTTPS URL (same as NEXT_PUBLIC_APP_URL origin)
  #
  #  False-positive suppressions: .github/zap/rules.tsv
  # ══════════════════════════════════════════════════════════════════════════
  dast:
    name: "16 · DAST (OWASP ZAP)"
    needs: [build-image, trivy-scan]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-image.result == 'success' &&
      (needs.trivy-scan.result == 'success' || needs.trivy-scan.result == 'skipped') &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      github.event.inputs.skip_deploy != 'true'
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: ZAP Full Scan — ${{ secrets.PRODUCTION_URL }}
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ secrets.PRODUCTION_URL }}
          allow_issue_writing: true
          fail_action: true
          rules_file_name: .github/zap/rules.tsv
          cmd_options: |
            -config globalexcludeurl.url_list.url(0).regex=.*\.map$
            -config globalexcludeurl.url_list.url(1).regex=.*/_next/static/.*
            -config globalexcludeurl.url_list.url(2).regex=.*/api/auth/.*
          artifact_name: zap-report-${{ github.sha }}

      - name: Upload ZAP SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap_scan_report.json
          category: owasp-zap
        continue-on-error: true

      - name: Write DAST summary
        if: always()
        run: |
          {
            echo "## 🕷️ DAST — OWASP ZAP Full Scan"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Target** | ${{ secrets.PRODUCTION_URL }} |"
            echo "| **Scan type** | Full (active + passive) |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "> Full HTML report available in the **zap-report-${{ github.sha }}** artifact."
            echo "> Findings with severity ≥ WARN are also raised as GitHub Issues."
          } >> "$GITHUB_STEP_SUMMARY"
