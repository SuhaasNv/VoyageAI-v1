name: Release — VoyageAI Production Deployment

# ─────────────────────────────────────────────────────────────────────────────
#  Full production release pipeline. Runs automatically when a commit lands on
#  main (i.e. after a PR is approved and merged).
#
#  Deployment order — each stage is blocked until the previous one passes:
#
#   ┌──────────────────────────────────────────────────────────────────────┐
#   │  GATE: AI Security (model · data · bias · risk score)               │
#   └──────────────────────────┬───────────────────────────────────────────┘
#                              │
#          ┌───────────────────┼────────────────────────┐
#          ↓                   ↓                        ↓
#   infra-apply          docker-push              migrate
#   (DigitalOcean         (LangGraph —             (Prisma
#    Terraform —          Trivy scan,               migrate
#    conditional)         push to DOCR)             deploy)
#          │
#   docker-push-nextjs
#   (Next.js — Trivy scan,
#    push to DOCR,
#    App Platform redeploy)
#          └───────────────────┬────────────────────────┘
#                              ↓
#                        deploy-nextjs-do
#                    (Next.js → DO App Platform — image already pushed by docker-push-nextjs)
#                              ↓
#                        health-check
#                  (Smoke tests on production)
#                              ↓
#                            dast
#                    (OWASP ZAP full scan)
#                              ↓
#                      release-summary
#                  (Step summary + GitHub Release)
#
# ─────────────────────────────────────────────────────────────────────────────
#  Required GitHub Secrets (repo → Settings → Secrets → Actions):
#
#  AI Gate + CI
#    (none — AI gate runs with mock LLM, no external secrets needed)
#
#  Infrastructure (DigitalOcean)
#    DIGITALOCEAN_ACCESS_TOKEN   DO API token (write:registry + app platform; rotate if DOCR push returns 401)
#    DIGITALOCEAN_EMAIL          Optional Repo Variable — DO login email for docker login (DO docs); omit to use username "token" + PAT (same as infra placeholder step)
#    DIGITALOCEAN_REGISTRY_USER  Optional Secret — overrides docker registry username (email or "token")
#    DO_REGISTRY_NAME            Registry slug (default voyageai-docr)
#    DO_TF_MANAGE_PROJECT        Repo Variable — set true only so Terraform creates the DO project (greenfield); omit = use existing project (default)
#    DO_SPACES_ACCESS_KEY        Spaces access key (Terraform state)
#    DO_SPACES_SECRET_KEY        Spaces secret key (Terraform state)
#    TF_VAR_next_internal_url    Optional — override LangGraph NEXT_INTERNAL_URL (default: Terraform uses Next live_url)
#    TF_VAR_internal_agent_secret Shared secret for Next.js ↔ LangGraph auth
#
#  Next.js runtime (injected via Terraform → App Platform env vars)
#    DATABASE_URL                Postgres connection string (pooler URL for the app)
#    DIRECT_URL                  Postgres direct URL (Prisma migrate deploy)
#    JWT_ACCESS_SECRET           JWT access token signing secret
#    JWT_REFRESH_SECRET          JWT refresh token signing secret
#    CSRF_SECRET                 CSRF HMAC secret
#    GOOGLE_CLIENT_ID            Google OAuth client ID
#    GOOGLE_CLIENT_SECRET        Google OAuth client secret
#    OPENAI_API_KEY              OpenAI API key (if LLM_PROVIDER=openai)
#    GEMINI_API_KEY              Google Gemini API key (if LLM_PROVIDER=gemini)
#    NEXT_PUBLIC_MAPBOX_TOKEN    Mapbox public token
#    PEXELS_API_KEY              Pexels image API key
#    REDIS_URL                   Redis TCP URL for ioredis (rate limits, AI cache) — e.g. Upstash rediss://
#    UPSTASH_REDIS_REST_URL      Optional; not used by src/lib/redis.ts (REST only)
#    UPSTASH_REDIS_REST_TOKEN    Optional; same as above
#    LANGGRAPH_SERVICE_URL       DO LangGraph App Platform URL
#
#  Smoke tests + DAST
#    PRODUCTION_URL              DO App Platform Next.js public URL
#    LANGGRAPH_SERVICE_URL       DO LangGraph HTTPS URL (health check)
#
#  Optional
#    DO_SPACES_REGION            Spaces region for TF backend (default: nyc3)
#    TF_VAR_alert_email          Email for DO infrastructure alerts
#    RISK_THRESHOLD              AI gate minimum score (default: 60)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ai_gate:
        description: "Skip AI Security Gate (emergency deploy only — requires reason)"
        required: false
        default: "false"
        type: boolean
      skip_infra:
        description: "Skip infrastructure apply (no Terraform changes)"
        required: false
        default: "false"
        type: boolean
      force_infra:
        description: "Force Terraform apply even if no infra/ files changed (use to push env var or config updates)"
        required: false
        default: "false"
        type: boolean
      environment:
        description: "Target environment to deploy to"
        required: false
        default: "production"
        type: choice
        options: [staging, production]
      skip_dast:
        description: "Skip DAST scan (faster release when no API surface changed)"
        required: false
        default: "false"
        type: boolean
      skip_trivy:
        description: "Skip all Trivy security scans (use only for emergency hotfixes)"
        required: false
        default: "false"
        type: boolean
      image_tag:
        description: "Existing DOCR image tag to deploy without rebuilding (e.g. sha-abc1234, 42, latest). Leave empty to build fresh from source."
        required: false
        default: ""
      emergency_reason:
        description: "Reason for skipping gates (required when any skip_* is true)"
        required: false
        default: ""

# Never cancel a running release — a half-deployed release is dangerous.
concurrency:
  group: release-production
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
#  Shared environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  # Node / Next.js
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  # Docker
  IMAGE_NAME: voyageai-langgraph
  NEXTJS_IMAGE_NAME: voyageai-nextjs
  PYTHON_VERSION: "3.11"
  DOCR_REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME || vars.REGISTRY_NAME || 'voyageai-docr' }}
  # DOCR docker login: DO docs use <account email> + PAT; `docker login -u token` + PAT also works (see infra placeholder).
  # Default "token" avoids 401 when email var is missing or does not match the PAT account.
  DOCR_DOCKER_USERNAME: ${{ secrets.DIGITALOCEAN_REGISTRY_USER || vars.DIGITALOCEAN_EMAIL || 'token' }}
  # AI gate — static checks, no real LLM calls, no production DB
  SKIP_ENV_VALIDATION: "1"
  LLM_PROVIDER: "mock"
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/voyageai_ci' }}
  DIRECT_URL_MOCK: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/voyageai_ci' }}
  REDIS_URL: ${{ secrets.REDIS_URL || '' }}
  JWT_ACCESS_SECRET: "release-gate-jwt-access-secret-32-chars-ok"
  JWT_REFRESH_SECRET: "release-gate-jwt-refresh-secret-32-chars-ok"
  CSRF_SECRET: "release-gate-csrf-secret-32-characters-ok"
  RISK_THRESHOLD: ${{ vars.RISK_THRESHOLD || '60' }}
  # Terraform
  TF_VERSION: "1.8.5"
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS_plan: "-lock-timeout=60s"
  TF_CLI_ARGS_apply: "-lock-timeout=60s"
  DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION || 'sgp1' }}
  DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
  TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
  TF_VAR_next_internal_url: ${{ secrets.TF_VAR_next_internal_url || '' }}
  TF_VAR_internal_agent_secret: ${{ secrets.TF_VAR_internal_agent_secret }}
  TF_VAR_environment: ${{ github.event.inputs.environment || 'production' }}
  TF_VAR_region: ${{ vars.DO_REGION || 'sgp' }}
  # Pin registry / project when importing existing DO resources; default project name is VoyageAI (shared across environments).
  TF_VAR_registry_name: ${{ vars.REGISTRY_NAME }}
  TF_VAR_project_name: ${{ vars.DO_PROJECT_NAME }}
  TF_VAR_manage_digitalocean_project: ${{ vars.DO_TF_MANAGE_PROJECT == 'true' && 'true' || 'false' }}
  # ── Next.js runtime secrets — propagated into App Platform via Terraform ─────
  TF_VAR_database_url: ${{ secrets.DATABASE_URL || '' }}
  TF_VAR_direct_url: ${{ secrets.DIRECT_URL || '' }}
  TF_VAR_jwt_access_secret: ${{ secrets.JWT_ACCESS_SECRET || '' }}
  TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET || '' }}
  TF_VAR_csrf_secret: ${{ secrets.CSRF_SECRET || '' }}
  TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID || '' }}
  TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
  TF_VAR_llm_provider: ${{ vars.LLM_PROVIDER || 'openai' }}
  TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY || '' }}
  TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY || '' }}
  TF_VAR_mapbox_token: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN || '' }}
  TF_VAR_pexels_api_key: ${{ secrets.PEXELS_API_KEY || '' }}
  TF_VAR_redis_url: ${{ secrets.REDIS_URL || '' }}
  TF_VAR_upstash_redis_rest_url: ${{ secrets.UPSTASH_REDIS_REST_URL || '' }}
  TF_VAR_upstash_redis_rest_token: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || '' }}
  TF_VAR_langgraph_service_url: ${{ secrets.LANGGRAPH_SERVICE_URL || '' }}
  TF_VAR_metrics_scrape_secret: ${{ secrets.METRICS_SCRAPE_SECRET || '' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL_S3: https://${{ vars.DO_SPACES_REGION || 'sgp1' }}.digitaloceanspaces.com

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 1 — AI SECURITY GATE
  #
  #  Runs all four gate scripts in sequence, aggregates into a composite
  #  0–100 risk score, and blocks the release if score < RISK_THRESHOLD.
  #
  #  Scripts:
  #    scripts/ai-gate/model-approval.ts  — approved models, bounds, fallback
  #    scripts/ai-gate/data-approval.ts   — Zod schemas, PII, field contracts
  #    scripts/ai-gate/bias-check.ts      — diversity, neutrality, fairness
  #    scripts/ai-gate/risk-score.ts      — aggregate → approve / block
  #
  #  Skippable via workflow_dispatch.skip_ai_gate=true (emergency only).
  # ════════════════════════════════════════════════════════════════════════════
  ai-gate:
    name: "1 · AI Security Gate"
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_ai_gate != 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Gate 1/4 — Model Approval"
        run: npx tsx scripts/ai-gate/model-approval.ts

      - name: "Gate 2/4 — Data Approval"
        run: npx tsx scripts/ai-gate/data-approval.ts

      - name: "Gate 3/4 — Bias / Fairness Check"
        run: npx tsx scripts/ai-gate/bias-check.ts

      - name: "Gate 4/4 — Risk Scoring"
        run: npx tsx scripts/ai-gate/risk-score.ts
        env:
          RISK_THRESHOLD: ${{ env.RISK_THRESHOLD }}

      - name: Write AI gate summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            let rs;
            try { rs = JSON.parse(fs.readFileSync('reports/ai-gate/risk-score.json','utf8')); }
            catch(e) { console.log('Risk score report not found — gate may have failed early'); process.exit(0); }
            const icon = rs.approved ? '✅' : '❌';
            const bar  = '█'.repeat(Math.round(rs.score/5)) + '░'.repeat(20-Math.round(rs.score/5));
            const rows = rs.stages.map(s => '| ' + [s.stage,s.total,s.failures,s.passed?'✅':'❌'].join(' | ') + ' |').join('\n');
            const body = [
              '## ' + icon + ' AI Security Gate — ' + (rs.approved ? 'APPROVED' : 'BLOCKED'),
              '',
              '\`' + bar + '\` **' + rs.score + ' / 100** (threshold: ' + rs.threshold + ')',
              '',
              '| Stage | Checks | Failures | Status |',
              '|-------|--------|----------|--------|',
              rows,
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, body + '\n');
          "

      - name: Upload AI gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-gate-reports-${{ github.sha }}
          path: reports/ai-gate/
          retention-days: 30

  # Gate skipped — log the emergency reason so it's auditable
  ai-gate-skipped:
    name: "1 · AI Security Gate (SKIPPED)"
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_ai_gate == 'true'
    steps:
      - name: Log skip reason
        run: |
          REASON="${{ github.event.inputs.emergency_reason }}"
          # Warn if no reason given but don't fail — downstream jobs must still run.
          # The warning is visible in the Actions log and step summary for audit.
          if [ -z "$REASON" ]; then
            REASON="No reason provided"
            echo "::warning::skip_ai_gate=true was used without an emergency_reason. Proceeding with audit note."
          fi
          {
            echo "## ⚠️ AI Security Gate — SKIPPED"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Skipped by** | @${{ github.actor }} |"
            echo "| **Reason** | $REASON |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::AI Security Gate was skipped. Reason: $REASON"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2a — INFRASTRUCTURE APPLY (DigitalOcean — Terraform)
  #
  #  Ensures the DigitalOcean Container Registry and App Platform service exist
  #  before the Docker image is pushed and Railway app is updated.
  #
  #  Conditional: only applies when infra/** files changed on this commit,
  #  or when skip_infra=false is explicitly overridden via workflow_dispatch.
  #
  #  Runs in parallel with docker-push and migrate (both only need ai-gate).
  # ════════════════════════════════════════════════════════════════════════════
  infra-apply:
    name: "2a · Infrastructure Apply (DigitalOcean)"
    needs: [ai-gate, ai-gate-skipped]
    if: |
      always() &&
      (needs.ai-gate.result == 'success' || needs.ai-gate-skipped.result == 'success') &&
      github.event.inputs.skip_infra != 'true'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app_id:      ${{ steps.tf-out.outputs.app_id }}
      app_url:     ${{ steps.tf-out.outputs.app_url }}
      registry:    ${{ steps.tf-out.outputs.registry }}
      nextjs_app_id:  ${{ steps.tf-out.outputs.nextjs_app_id }}
      nextjs_app_url: ${{ steps.tf-out.outputs.nextjs_app_url }}
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit to detect changed files

      - name: Detect infra file changes
        id: infra-changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- infra/ | wc -l)
          # Honor force_infra override — treat as if files changed
          if [ "${{ github.event.inputs.force_infra }}" = "true" ]; then
            CHANGED=1
            echo "⚡ force_infra=true — running Terraform regardless of file changes"
          fi
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Infra files changed: ${CHANGED}"

      - name: Set up Terraform ${{ env.TF_VERSION }}
        if: steps.infra-changed.outputs.changed != '0'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore Terraform provider cache
        if: steps.infra-changed.outputs.changed != '0'
        uses: actions/cache@v4
        with:
          path: infra/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Bootstrap tfstate bucket
        if: steps.infra-changed.outputs.changed != '0'
        run: |
          set -euo pipefail
          BUCKET="voyageai-tfstate"
          REGION="${DO_SPACES_REGION}"
          ENDPOINT="${AWS_ENDPOINT_URL_S3}"

          if aws s3api head-bucket --bucket "$BUCKET" --endpoint-url "$ENDPOINT" 2>/dev/null; then
            echo "✅ Terraform state bucket exists: ${BUCKET} (${REGION})"
            exit 0
          fi

          echo "📦 Creating Spaces bucket ${BUCKET} in ${REGION} (endpoint ${ENDPOINT})..."
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --endpoint-url "$ENDPOINT" \
            --create-bucket-configuration "{\"LocationConstraint\":\"${REGION}\"}"

          echo "✅ Created state bucket ${BUCKET}"

      - name: terraform init
        if: steps.infra-changed.outputs.changed != '0'
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "::notice::terraform init attempt ${attempt}/6..."
            if terraform init \
              -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
              -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}" \
              -reconfigure \
              -input=false; then
              exit 0
            fi
            echo "::warning::terraform init failed (registry timeout/network); retrying in 30s..."
            [ "$attempt" = "6" ] && { echo "::error::terraform init failed after 6 attempts"; exit 1; }
            sleep 30
          done

      # DOCR must exist before docker push — App spec may reference :placeholder until CI pushes real tags.
      - name: Terraform apply — container registry only (before DOCR push)
        if: steps.infra-changed.outputs.changed != '0'
        run: |
          terraform apply -input=false -no-color -auto-approve \
            -target=digitalocean_container_registry.voyageai \
            -target=digitalocean_container_registry_docker_credentials.app_platform

      # Skip placeholder push only when both repos already have :placeholder (matches Terraform default image tag).
      - name: Install doctl (registry repo check)
        if: steps.infra-changed.outputs.changed != '0'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Push placeholder images to DOCR
        if: steps.infra-changed.outputs.changed != '0'
        working-directory: infra
        run: |
          set -euo pipefail
          REGISTRY="registry.digitalocean.com/${{ vars.REGISTRY_NAME || 'voyageai-docr' }}"
          PH_TAG="placeholder"
          SKIP=0
          if REPOS_OUT=$(doctl registry repository list --format Name --no-header 2>/dev/null); then
            if echo "$REPOS_OUT" | grep -qx 'voyageai-langgraph' && echo "$REPOS_OUT" | grep -qx 'voyageai-nextjs'; then
              LG_OK=0
              NX_OK=0
              if doctl registry repository list-tags voyageai-langgraph --format Tag --no-header 2>/dev/null | grep -qx "$PH_TAG"; then LG_OK=1; fi
              if doctl registry repository list-tags voyageai-nextjs --format Tag --no-header 2>/dev/null | grep -qx "$PH_TAG"; then NX_OK=1; fi
              if [ "$LG_OK" -eq 1 ] && [ "$NX_OK" -eq 1 ]; then
                SKIP=1
              fi
            fi
          else
            echo "::warning::Could not list DOCR repositories; pushing placeholders to be safe."
          fi
          if [ "$SKIP" -eq 1 ]; then
            echo "::notice::DOCR repos already have :${PH_TAG} — skipping placeholder image push."
            exit 0
          fi
          echo "$DIGITALOCEAN_ACCESS_TOKEN" | \
            docker login registry.digitalocean.com --username token --password-stdin
          echo "::notice::If push fails with unauthorized, ensure DIGITALOCEAN_ACCESS_TOKEN has write:registry (or Full Access)."
          docker build -t "${REGISTRY}/voyageai-langgraph:placeholder" placeholder/
          docker push "${REGISTRY}/voyageai-langgraph:placeholder"
          docker build -t "${REGISTRY}/voyageai-nextjs:placeholder" placeholder/nextjs/
          docker push "${REGISTRY}/voyageai-nextjs:placeholder"

      - name: terraform plan
        if: steps.infra-changed.outputs.changed != '0'
        id: plan
        run: terraform plan -out=tfplan.binary -input=false -no-color -detailed-exitcode
        continue-on-error: true

      - name: terraform apply
        if: |
          steps.infra-changed.outputs.changed != '0' &&
          steps.plan.outputs.exitcode != '1'
        run: terraform apply -input=false -no-color tfplan.binary

      - name: Capture infra outputs
        if: steps.infra-changed.outputs.changed != '0'
        id: tf-out
        run: |
          echo "registry=$(terraform output -raw registry_endpoint 2>/dev/null || echo 'N/A')"        >> "$GITHUB_OUTPUT"
          echo "app_url=$(terraform output -raw langgraph_default_ingress 2>/dev/null || terraform output -raw langgraph_live_url 2>/dev/null || echo 'N/A')"        >> "$GITHUB_OUTPUT"
          echo "app_id=$(terraform output -raw langgraph_app_id 2>/dev/null || echo '')"              >> "$GITHUB_OUTPUT"
          echo "nextjs_app_url=$(terraform output -raw nextjs_default_ingress 2>/dev/null || terraform output -raw nextjs_live_url 2>/dev/null || echo 'N/A')"    >> "$GITHUB_OUTPUT"
          echo "nextjs_app_id=$(terraform output -raw nextjs_app_id 2>/dev/null || echo '')"          >> "$GITHUB_OUTPUT"

      - name: Write infra summary
        if: always()
        run: |
          CHANGED="${{ steps.infra-changed.outputs.changed }}"
          {
            if [ "$CHANGED" = "0" ]; then
              echo "## 🏗️ Infrastructure — ⏭️ No Changes"
              echo ""
              echo "> No \`infra/\` files were modified in this commit — Terraform apply skipped."
            else
              echo "## 🏗️ Infrastructure — ✅ Applied"
              echo ""
              echo "| Resource | Value |"
              echo "|----------|-------|"
              echo "| **Registry** | \`${{ steps.tf-out.outputs.registry }}\` |"
              echo "| **LangGraph URL** | \`${{ steps.tf-out.outputs.app_url }}\` |"
              echo "| **Next.js URL** | \`${{ steps.tf-out.outputs.nextjs_app_url }}\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2d — RESOLVE APP URLs
  #
  #  Uses doctl (DO API token already in secrets) to look up the live URLs of
  #  the Next.js and LangGraph App Platform apps for the target environment.
  #  Eliminates the need for a PRODUCTION_URL GitHub Secret — the URL is
  #  discovered automatically from the deployed app's name.
  #
  #  App name pattern (set by Terraform): voyageai-nextjs-<environment>
  #                                       voyageai-langgraph-<environment>
  #
  #  Falls back to infra-apply Terraform outputs when doctl returns nothing
  #  (e.g. first deploy before the app exists in DO).
  # ════════════════════════════════════════════════════════════════════════════
  resolve-urls:
    name: "2d · Resolve App URLs (DigitalOcean API)"
    needs: [ai-gate, ai-gate-skipped, infra-apply]
    if: |
      always() &&
      (needs.ai-gate.result == 'success' || needs.ai-gate-skipped.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      nextjs_url:       ${{ steps.fetch.outputs.nextjs_url }}
      langgraph_url:    ${{ steps.fetch.outputs.langgraph_url }}
      nextjs_app_id:    ${{ steps.fetch.outputs.nextjs_app_id }}
      langgraph_app_id: ${{ steps.fetch.outputs.langgraph_app_id }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Fetch App URLs from DigitalOcean
        id: fetch
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'production' }}"
          APPS_JSON=$(doctl apps list --output json 2>/dev/null || echo '[]')

          # doctl may return a bare array or { "apps": [...] }; list payloads may omit spec.name (use active_deployment.spec.name).
          LINE=$(echo "$APPS_JSON" | jq -r --arg nxs "voyageai-nextjs-${ENV}" --arg nlg "voyageai-langgraph-${ENV}" '
            def applist:
              if type == "object" and (.apps | type == "array") then .apps
              elif type == "array" then .
              else [] end;
            def appname:
              ((.spec // {}) | .name // "") as $sn
              | if $sn != "" then $sn
                else (((.active_deployment // {}) | .spec // {}) | .name // "")
                end;
            def row($w):
              ((applist | map(select(appname == $w)) | .[0]) // null)
              | if . == null then ["",""]
                else [(.id // ""), (.live_url // .default_ingress // "")]
                end;
            (row($nxs) + row($nlg)) | @tsv
          ')
          [ -z "$LINE" ] && LINE=$'\t\t\t'
          IFS=$'\t' read -r NEXTJS_ID NEXTJS_URL LG_ID LG_URL <<< "$LINE"

          # Fall back to Terraform outputs if doctl returned nothing
          [ -z "$NEXTJS_URL" ] && NEXTJS_URL="${{ needs.infra-apply.outputs.nextjs_app_url }}"
          [ -z "$LG_URL" ]     && LG_URL="${{ needs.infra-apply.outputs.app_url }}"
          [ -z "$NEXTJS_ID" ] && NEXTJS_ID="${{ needs.infra-apply.outputs.nextjs_app_id }}"
          [ -z "$LG_ID" ]     && LG_ID="${{ needs.infra-apply.outputs.app_id }}"

          echo "nextjs_url=${NEXTJS_URL}"       >> "$GITHUB_OUTPUT"
          echo "langgraph_url=${LG_URL}"        >> "$GITHUB_OUTPUT"
          echo "nextjs_app_id=${NEXTJS_ID}"     >> "$GITHUB_OUTPUT"
          echo "langgraph_app_id=${LG_ID}"      >> "$GITHUB_OUTPUT"
          echo "✅ Next.js URL:   ${NEXTJS_URL} (id=${NEXTJS_ID:-none})"
          echo "✅ LangGraph URL: ${LG_URL} (id=${LG_ID:-none})"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2b — DOCKER: BUILD → TRIVY SCAN → PUSH TO DOCR
  #
  #  1. Multi-stage build of the Python LangGraph service
  #  2. Trivy scans the image tarball:
  #       • SARIF → GitHub Security tab (all severities)
  #       • Blocks on CRITICAL CVEs
  #       • Warns on HIGH CVEs (non-blocking)
  #       • Blocks on secrets inside the image filesystem
  #       • Blocks on CRITICAL/HIGH Dockerfile misconfigs
  #  3. Rebuilds with DOCR tags and pushes with SLSA provenance + SBOM
  #  4. Trivy re-verifies the pushed registry image (digest confirmation)
  #
  #  Runs in parallel with migrate (both need ai-gate + infra-apply).
  # ════════════════════════════════════════════════════════════════════════════
  docker-push:
    name: "2b · Docker — Build · Trivy · Push to DOCR"
    needs: [ai-gate, ai-gate-skipped, infra-apply, resolve-urls]
    if: |
      always() &&
      (needs.ai-gate.result == 'success' || needs.ai-gate-skipped.result == 'success') &&
      (needs.infra-apply.result == 'success' || needs.infra-apply.result == 'skipped') &&
      (needs.resolve-urls.result == 'success' || needs.resolve-urls.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event.inputs.image_tag == ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry (PAT as password)
        if: github.event.inputs.image_tag == ''
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ env.DOCR_DOCKER_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Build (export as tarball — no push yet) ───────────────────────────
      - name: Compute image metadata
        if: github.event.inputs.image_tag == ''
        id: meta-local
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build image and export tarball
        if: github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v5
        with:
          context: ./python/agent_graph
          file: ./python/agent_graph/Dockerfile
          push: false
          tags: ${{ steps.meta-local.outputs.tags }}
          outputs: type=docker,dest=/tmp/langgraph-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Load image into Docker daemon
        if: github.event.inputs.image_tag == ''
        run: docker load --input /tmp/langgraph-image.tar

      # ── Trivy scans (build path only — skipped when redeploying existing tag) ─
      - name: Trivy — SARIF report (all severities → Security tab)
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,config"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release
        continue-on-error: true

      - name: Trivy — gate on CRITICAL CVEs
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "1"

      - name: Trivy — warn on HIGH CVEs
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          severity: HIGH
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"

      - name: Trivy — secret scan inside image
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          scanners: "secret"
          exit-code: "1"

      - name: Trivy — Dockerfile misconfig scan
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ./python/agent_graph
          format: table
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # ── Push to DOCR ──────────────────────────────────────────────────────
      - name: Compute DOCR image metadata
        if: github.event.inputs.image_tag == ''
        id: meta-docr
        uses: docker/metadata-action@v5
        with:
          images: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push to DOCR (layers cached)
        id: push
        if: github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v5
        with:
          context: ./python/agent_graph
          file: ./python/agent_graph/Dockerfile
          push: true
          tags: ${{ steps.meta-docr.outputs.tags }}
          labels: ${{ steps.meta-docr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy — verify pushed registry image
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
        env:
          TRIVY_USERNAME: ${{ env.DOCR_DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Write Docker summary
        if: github.event.inputs.image_tag == ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "## 🐳 Docker — ✅ Pushed to DOCR"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}\` |"
            echo "| **Image** | \`${{ env.IMAGE_NAME }}\` |"
            echo "| **Tags** | \`latest\`, \`sha-${SHORT_SHA}\`, \`${{ github.run_number }}\` |"
            echo "| **Mode** | Built from source |"
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |"
            echo "| **Trivy** | ✅ No CRITICAL CVEs |"
          } >> "$GITHUB_STEP_SUMMARY"

      # The app was initially created with tag=placeholder.
      # Now that :latest is in DOCR, force a new deployment so App Platform
      # picks up the real image.  Skipped if infra-apply did not surface an ID.
      - name: Redeploy LangGraph App Platform with real image
        run: |
          set -euo pipefail
          APP_ID="${{ needs.infra-apply.outputs.app_id }}"
          if [ -z "$APP_ID" ]; then APP_ID="${{ needs.resolve-urls.outputs.langgraph_app_id }}"; fi
          if [ -z "$APP_ID" ]; then
            ENV="${{ github.event.inputs.environment || 'production' }}"
            APPS_JSON=$(doctl apps list --output json 2>/dev/null || echo '[]')
            APP_ID=$(echo "$APPS_JSON" | jq -r --arg n "voyageai-langgraph-${ENV}" '
              def applist:
                if type == "object" and (.apps | type == "array") then .apps
                elif type == "array" then .
                else [] end;
              def appname:
                ((.spec // {}) | .name // "") as $sn
                | if $sn != "" then $sn
                  else (((.active_deployment // {}) | .spec // {}) | .name // "")
                  end;
              (applist | map(select(appname == $n)) | .[0] // empty) | (.id // empty)
            ')
          fi
          if [ -z "$APP_ID" ]; then
            echo "⚠️ Could not find LangGraph app ID — skipping redeploy trigger"
            exit 0
          fi
          doctl auth init --access-token "$DIGITALOCEAN_ACCESS_TOKEN"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [ -n "$IMAGE_TAG" ]; then
            echo "📌 Updating App Platform spec to use existing tag: ${IMAGE_TAG}"
            TMPSPEC=$(mktemp)
            doctl apps get "$APP_ID" --output json \
              | jq --arg t "$IMAGE_TAG" \
                '.[0].spec.services = (.[0].spec.services | map(if .image then .image.tag = $t else . end))
                 | .[0].spec' > "$TMPSPEC"
            doctl apps update "$APP_ID" --spec "$TMPSPEC"
            rm -f "$TMPSPEC"
            # doctl apps update auto-triggers a deployment — give it a moment to register
            echo "⏳ Spec updated — waiting for auto-triggered deployment..."
            sleep 8
          else
            echo "🚀 Triggering App Platform deployment for LangGraph app ${APP_ID}"
            doctl apps create-deployment "$APP_ID"
            sleep 5
          fi
          # Poll the latest deployment (handles SUPERSEDED by following the newest deployment)
          for i in $(seq 1 90); do
            DEPLOY=$(doctl apps list-deployments "$APP_ID" --output json \
              | jq -c 'if type=="array" then . else (.app_deployments // []) end
                       | sort_by(.created_at) | reverse | .[0]')
            DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id // empty')
            PHASE=$(echo "$DEPLOY"     | jq -r '.phase // "UNKNOWN"')
            OK_S=$(echo "$DEPLOY"      | jq -r '.progress.success_steps // 0')
            TOTAL=$(echo "$DEPLOY"     | jq -r '.progress.total_steps // "?"')
            echo "  [${i}/90] ${DEPLOY_ID}: ${PHASE} (${OK_S}/${TOTAL} steps)"
            case "$PHASE" in
              ACTIVE)    echo "✅ LangGraph deployment is ACTIVE"; break ;;
              ERROR)     echo "❌ LangGraph deployment failed"; exit 1 ;;
              CANCELED)  echo "❌ LangGraph deployment canceled"; exit 1 ;;
              SUPERSEDED)
                # A newer deployment superseded this one — loop picks it up next iteration
                sleep 5; continue ;;
              *) sleep 10 ;;
            esac
            [ "$i" = "90" ] && { echo "❌ Timed out (15 min) waiting for LangGraph deployment"; exit 1; }
          done

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2b-NX — DOCKER: BUILD → TRIVY SCAN → PUSH NEXT.JS TO DOCR
  #
  #  Mirrors docker-push but for the Next.js frontend image (Dockerfile.app).
  #  Runs in parallel with docker-push and migrate.
  # ════════════════════════════════════════════════════════════════════════════
  docker-push-nextjs:
    name: "2b-NX · Docker — Next.js Build · Trivy · Push to DOCR"
    needs: [ai-gate, ai-gate-skipped, infra-apply, resolve-urls]
    if: |
      always() &&
      (needs.ai-gate.result == 'success' || needs.ai-gate-skipped.result == 'success') &&
      (needs.infra-apply.result == 'success' || needs.infra-apply.result == 'skipped') &&
      (needs.resolve-urls.result == 'success' || needs.resolve-urls.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event.inputs.image_tag == ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry (PAT as password)
        if: github.event.inputs.image_tag == ''
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ env.DOCR_DOCKER_USERNAME }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Build (tarball — no push yet) ─────────────────────────────────────
      - name: Compute image metadata
        if: github.event.inputs.image_tag == ''
        id: meta-local
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.NEXTJS_IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build Next.js image and export tarball
        if: github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: false
          tags: ${{ steps.meta-local.outputs.tags }}
          outputs: type=docker,dest=/tmp/nextjs-image.tar
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ github.sha }}

      - name: Load image into Docker daemon
        if: github.event.inputs.image_tag == ''
        run: docker load --input /tmp/nextjs-image.tar

      # ── Trivy scans (build path only — skipped when redeploying existing tag) ─
      - name: Trivy — SARIF report (all severities → Security tab)
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: sarif
          output: trivy-nextjs-results.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln,secret,config"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        with:
          sarif_file: trivy-nextjs-results.sarif
          category: trivy-nextjs-release
        continue-on-error: true

      - name: Trivy — gate on CRITICAL CVEs
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "1"

      - name: Trivy — warn on HIGH CVEs
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: HIGH
          ignore-unfixed: true
          vuln-type: "os,library"
          scanners: "vuln"
          exit-code: "0"

      - name: Trivy — secret scan inside image
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          scanners: "secret"
          exit-code: "1"

      - name: Trivy — Dockerfile misconfig scan
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          config: Dockerfile.app
          format: table
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # ── Push to DOCR ──────────────────────────────────────────────────────
      - name: Compute DOCR image metadata
        if: github.event.inputs.image_tag == ''
        id: meta-docr
        uses: docker/metadata-action@v5
        with:
          images: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.NEXTJS_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push Next.js to DOCR (layers cached)
        id: push
        if: github.event.inputs.image_tag == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ steps.meta-docr.outputs.tags }}
          labels: ${{ steps.meta-docr.outputs.labels }}
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs
          provenance: true
          sbom: true
          build-args: |
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Trivy — verify pushed Next.js registry image
        if: github.event.inputs.image_tag == '' && github.event.inputs.skip_trivy != 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.NEXTJS_IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
        env:
          TRIVY_USERNAME: ${{ env.DOCR_DOCKER_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Redeploy Next.js App Platform with real image
        run: |
          set -euo pipefail
          # Prefer Terraform output, then resolve-urls (same doctl+jq as 2d), then raw doctl list.
          APP_ID="${{ needs.infra-apply.outputs.nextjs_app_id }}"
          if [ -z "$APP_ID" ]; then APP_ID="${{ needs.resolve-urls.outputs.nextjs_app_id }}"; fi
          if [ -z "$APP_ID" ]; then
            ENV="${{ github.event.inputs.environment || 'production' }}"
            APPS_JSON=$(doctl apps list --output json 2>/dev/null || echo '[]')
            APP_ID=$(echo "$APPS_JSON" | jq -r --arg n "voyageai-nextjs-${ENV}" '
              def applist:
                if type == "object" and (.apps | type == "array") then .apps
                elif type == "array" then .
                else [] end;
              def appname:
                ((.spec // {}) | .name // "") as $sn
                | if $sn != "" then $sn
                  else (((.active_deployment // {}) | .spec // {}) | .name // "")
                  end;
              (applist | map(select(appname == $n)) | .[0] // empty) | (.id // empty)
            ')
          fi
          if [ -z "$APP_ID" ]; then
            echo "⚠️ Could not find Next.js app ID — skipping redeploy trigger"
            exit 0
          fi
          doctl auth init --access-token "$DIGITALOCEAN_ACCESS_TOKEN"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [ -n "$IMAGE_TAG" ]; then
            echo "📌 Updating App Platform spec to use existing tag: ${IMAGE_TAG}"
            TMPSPEC=$(mktemp)
            doctl apps get "$APP_ID" --output json \
              | jq --arg t "$IMAGE_TAG" \
                '.[0].spec.services = (.[0].spec.services | map(if .image then .image.tag = $t else . end))
                 | .[0].spec' > "$TMPSPEC"
            doctl apps update "$APP_ID" --spec "$TMPSPEC"
            rm -f "$TMPSPEC"
            # doctl apps update auto-triggers a deployment — give it a moment to register
            echo "⏳ Spec updated — waiting for auto-triggered deployment..."
            sleep 8
          else
            echo "🚀 Triggering App Platform deployment for Next.js app ${APP_ID}"
            doctl apps create-deployment "$APP_ID"
            sleep 5
          fi
          # Poll the latest deployment (handles SUPERSEDED by following the newest deployment)
          for i in $(seq 1 90); do
            DEPLOY=$(doctl apps list-deployments "$APP_ID" --output json \
              | jq -c 'if type=="array" then . else (.app_deployments // []) end
                       | sort_by(.created_at) | reverse | .[0]')
            DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id // empty')
            PHASE=$(echo "$DEPLOY"     | jq -r '.phase // "UNKNOWN"')
            OK_S=$(echo "$DEPLOY"      | jq -r '.progress.success_steps // 0')
            TOTAL=$(echo "$DEPLOY"     | jq -r '.progress.total_steps // "?"')
            echo "  [${i}/90] ${DEPLOY_ID}: ${PHASE} (${OK_S}/${TOTAL} steps)"
            case "$PHASE" in
              ACTIVE)    echo "✅ Next.js deployment is ACTIVE"; break ;;
              ERROR)     echo "❌ Next.js deployment failed"; exit 1 ;;
              CANCELED)  echo "❌ Next.js deployment canceled"; exit 1 ;;
              SUPERSEDED)
                # A newer deployment superseded this one — loop picks it up next iteration
                sleep 5; continue ;;
              *) sleep 10 ;;
            esac
            [ "$i" = "90" ] && { echo "❌ Timed out (15 min) waiting for Next.js deployment"; exit 1; }
          done

      - name: Write Next.js Docker summary
        if: github.event.inputs.image_tag == ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "## 🐳 Next.js Container — ✅ Pushed to DOCR"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Registry** | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}\` |"
            echo "| **Image** | \`${{ env.NEXTJS_IMAGE_NAME }}\` |"
            echo "| **Tags** | \`latest\`, \`sha-${SHORT_SHA}\`, \`${{ github.run_number }}\` |"
            echo "| **Mode** | Built from source |"
            echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |"
            echo "| **Trivy** | ✅ No CRITICAL CVEs |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2e — WIRE SERVICES
  #
  #  Runs after both Docker jobs (LangGraph + Next.js) are deployed.
  #  Ensures cross-service env vars are correct so the two apps can talk:
  #
  #    Next.js   → LangGraph : LANGGRAPH_SERVICE_URL   (Next.js spec env var)
  #    LangGraph → Next.js   : NEXT_INTERNAL_URL       (LangGraph spec env var)
  #
  #  Terraform auto-sets NEXT_INTERNAL_URL from nextjs.live_url, but
  #  LANGGRAPH_SERVICE_URL in Next.js comes from a static GitHub secret
  #  (var.langgraph_service_url) that can be stale or empty.
  #  This job reads the *live* App Platform URLs via the DO API and patches
  #  either spec if the stored value doesn't match — triggering a minimal
  #  redeploy only when something actually changed.
  # ════════════════════════════════════════════════════════════════════════════
  wire-services:
    name: "2e · Wire Services — Sync cross-service URLs"
    needs: [docker-push, docker-push-nextjs, resolve-urls]
    if: |
      always() &&
      (needs.docker-push.result == 'success' || needs.docker-push.result == 'skipped') &&
      (needs.docker-push-nextjs.result == 'success' || needs.docker-push-nextjs.result == 'skipped') &&
      needs.resolve-urls.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Next.js → LangGraph ───────────────────────────────────────────────
      # Ensure LANGGRAPH_SERVICE_URL in the Next.js App Platform spec matches
      # the actual live LangGraph URL.  Only triggers a redeployment if the
      # value is wrong; a no-op update costs nothing.
      - name: Sync LANGGRAPH_SERVICE_URL into Next.js spec
        run: |
          set -euo pipefail
          NX_APP_ID="${{ needs.resolve-urls.outputs.nextjs_app_id }}"
          LG_URL="${{ needs.resolve-urls.outputs.langgraph_url }}"

          if [ -z "$NX_APP_ID" ] || [ -z "$LG_URL" ]; then
            echo "⚠️ Missing Next.js app ID or LangGraph URL — skipping LANGGRAPH_SERVICE_URL sync"
            exit 0
          fi

          CURRENT=$(doctl apps get "$NX_APP_ID" --output json \
            | jq -r '.[0].spec.services[0].envs[]? | select(.key=="LANGGRAPH_SERVICE_URL") | .value // empty')

          echo "Stored  LANGGRAPH_SERVICE_URL : '${CURRENT}'"
          echo "Actual  LangGraph live URL     : '${LG_URL}'"

          if [ "$CURRENT" = "$LG_URL" ]; then
            echo "✅ LANGGRAPH_SERVICE_URL already correct — no update needed"
            exit 0
          fi

          echo "📌 Updating LANGGRAPH_SERVICE_URL in Next.js spec..."
          TMPSPEC=$(mktemp)
          doctl apps get "$NX_APP_ID" --output json \
            | jq --arg url "$LG_URL" \
              '.[0].spec.services = (.[0].spec.services | map(
                 .envs = (.envs | map(if .key == "LANGGRAPH_SERVICE_URL" then .value = $url else . end))
               )) | .[0].spec' > "$TMPSPEC"
          doctl apps update "$NX_APP_ID" --spec "$TMPSPEC"
          rm -f "$TMPSPEC"

          echo "⏳ Spec updated — waiting for Next.js to redeploy with correct LANGGRAPH_SERVICE_URL..."
          sleep 8
          for i in $(seq 1 60); do
            DEPLOY=$(doctl apps list-deployments "$NX_APP_ID" --output json \
              | jq -c 'if type=="array" then . else (.app_deployments // []) end
                       | sort_by(.created_at) | reverse | .[0]')
            PHASE=$(echo "$DEPLOY" | jq -r '.phase // "UNKNOWN"')
            echo "  [${i}/60] Next.js: ${PHASE}"
            case "$PHASE" in
              ACTIVE)    echo "✅ Next.js ACTIVE with correct LANGGRAPH_SERVICE_URL"; break ;;
              ERROR)     echo "❌ Next.js deployment failed after URL sync"; exit 1 ;;
              CANCELED)  echo "❌ Next.js deployment canceled"; exit 1 ;;
              SUPERSEDED) sleep 5; continue ;;
              *) sleep 10 ;;
            esac
            [ "$i" = "60" ] && { echo "❌ Timed out waiting for Next.js URL sync deployment"; exit 1; }
          done

      # ── LangGraph → Next.js ───────────────────────────────────────────────
      # Terraform normally fills NEXT_INTERNAL_URL from nextjs.live_url, but
      # when Terraform is skipped (image_tag redeploy) the value can be stale.
      - name: Sync NEXT_INTERNAL_URL into LangGraph spec
        run: |
          set -euo pipefail
          LG_APP_ID="${{ needs.resolve-urls.outputs.langgraph_app_id }}"
          NX_URL="${{ needs.resolve-urls.outputs.nextjs_url }}"

          if [ -z "$LG_APP_ID" ] || [ -z "$NX_URL" ]; then
            echo "⚠️ Missing LangGraph app ID or Next.js URL — skipping NEXT_INTERNAL_URL sync"
            exit 0
          fi

          CURRENT=$(doctl apps get "$LG_APP_ID" --output json \
            | jq -r '.[0].spec.services[0].envs[]? | select(.key=="NEXT_INTERNAL_URL") | .value // empty')

          echo "Stored  NEXT_INTERNAL_URL : '${CURRENT}'"
          echo "Actual  Next.js live URL   : '${NX_URL}'"

          if [ "$CURRENT" = "$NX_URL" ]; then
            echo "✅ NEXT_INTERNAL_URL already correct — no update needed"
            exit 0
          fi

          echo "📌 Updating NEXT_INTERNAL_URL in LangGraph spec..."
          TMPSPEC=$(mktemp)
          doctl apps get "$LG_APP_ID" --output json \
            | jq --arg url "$NX_URL" \
              '.[0].spec.services = (.[0].spec.services | map(
                 .envs = (.envs | map(if .key == "NEXT_INTERNAL_URL" then .value = $url else . end))
               )) | .[0].spec' > "$TMPSPEC"
          doctl apps update "$LG_APP_ID" --spec "$TMPSPEC"
          rm -f "$TMPSPEC"

          echo "⏳ Spec updated — waiting for LangGraph to redeploy with correct NEXT_INTERNAL_URL..."
          sleep 8
          for i in $(seq 1 60); do
            DEPLOY=$(doctl apps list-deployments "$LG_APP_ID" --output json \
              | jq -c 'if type=="array" then . else (.app_deployments // []) end
                       | sort_by(.created_at) | reverse | .[0]')
            PHASE=$(echo "$DEPLOY" | jq -r '.phase // "UNKNOWN"')
            echo "  [${i}/60] LangGraph: ${PHASE}"
            case "$PHASE" in
              ACTIVE)    echo "✅ LangGraph ACTIVE with correct NEXT_INTERNAL_URL"; break ;;
              ERROR)     echo "❌ LangGraph deployment failed after URL sync"; exit 1 ;;
              CANCELED)  echo "❌ LangGraph deployment canceled"; exit 1 ;;
              SUPERSEDED) sleep 5; continue ;;
              *) sleep 10 ;;
            esac
            [ "$i" = "60" ] && { echo "❌ Timed out waiting for LangGraph URL sync deployment"; exit 1; }
          done

      - name: Write wire-services summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          {
            echo "## 🔗 Wire Services — ${ICON} ${STATUS^}"
            echo ""
            echo "| Direction | Env Var | Value |"
            echo "|-----------|---------|-------|"
            echo "| Next.js → LangGraph | \`LANGGRAPH_SERVICE_URL\` | \`${{ needs.resolve-urls.outputs.langgraph_url }}\` |"
            echo "| LangGraph → Next.js | \`NEXT_INTERNAL_URL\` | \`${{ needs.resolve-urls.outputs.nextjs_url }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 2c — DATABASE MIGRATION
  #
  #  Runs Prisma `migrate deploy` against the production database BEFORE
  #  the new application code goes live.
  #  Safe for production: applies only committed SQL files, never auto-generates.
  #
  #  Runs in parallel with docker-push (both need ai-gate + infra-apply).
  # ════════════════════════════════════════════════════════════════════════════
  migrate:
    name: "2c · Database Migration (Prisma)"
    needs: [ai-gate, ai-gate-skipped, infra-apply]
    if: |
      always() &&
      (needs.ai-gate.result == 'success' || needs.ai-gate-skipped.result == 'success') &&
      (needs.infra-apply.result == 'success' || needs.infra-apply.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Validate migration state (dry run)
        run: npx prisma migrate status
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Apply pending migrations
        run: npx prisma migrate deploy
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Write migration summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          {
            echo "## 🗄️ Database Migration — ${ICON} ${STATUS^}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Status** | ${ICON} ${STATUS^} |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "> Prisma \`migrate deploy\` applies only committed SQL migrations."
          } >> "$GITHUB_STEP_SUMMARY"

  # ══════════════════════════════════════════════════════════════════════════
  #  STAGE 3 — CONFIRM DEPLOY TO DIGITALOCEAN APP PLATFORM (Next.js)
  #
  #  Runs after docker-push-nextjs AND migrate both succeed, ensuring:
  #    • The Next.js image is live in DOCR (App Platform auto-deploys via doctl)
  #    • The database schema is up-to-date before new app code runs
  #
  #  The actual App Platform redeploy is triggered inside docker-push-nextjs.
  #  This stage confirms success and gates the health-check stage.
  #
  #  App URL is resolved automatically from the DO API by the resolve-urls job.
  #  PRODUCTION_URL GitHub Secret is no longer required.
  # ══════════════════════════════════════════════════════════════════════════
  deploy-nextjs-do:
    name: "3 · Deploy — Next.js → DigitalOcean App Platform"
    needs: [docker-push-nextjs, wire-services, migrate, resolve-urls]
    if: |
      always() &&
      needs.docker-push-nextjs.result == 'success' &&
      needs.wire-services.result == 'success' &&
      needs.migrate.result == 'success' &&
      needs.resolve-urls.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      app_url: ${{ needs.resolve-urls.outputs.nextjs_url }}
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ needs.resolve-urls.outputs.nextjs_url }}

    steps:
      - name: Confirm App Platform deployment
        run: |
          echo "Next.js App Platform redeployment was triggered in the docker-push-nextjs stage."
          echo "App URL: ${{ needs.resolve-urls.outputs.nextjs_url }}"

      - name: Write deploy summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          APP_URL="${{ needs.resolve-urls.outputs.nextjs_url }}"
          {
            echo "## 🌊 Next.js Deploy → DigitalOcean — ${ICON} ${STATUS^}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Platform** | DigitalOcean App Platform |"
            echo "| **Environment** | ${{ github.event.inputs.environment || 'production' }} |"
            echo "| **App URL** | ${APP_URL} |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Author** | @${{ github.actor }} |"
            echo "| **Message** | ${{ github.event.head_commit.message }} |"
            echo ""
            echo "> Secrets are injected via Terraform App Platform env vars."
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 4 — HEALTH CHECK (Production Smoke Tests)
  #
  #  Hits key production endpoints to confirm the deployment is healthy before
  #  running DAST. Retries each endpoint up to 5 times with 10s back-off.
  #
  #  Checks:
  #    • Next.js root page         — GET /                    (200)
  #    • CSRF endpoint             — GET /api/auth/csrf       (200 + token in body)
  #    • Next.js service health    — GET /api/health          (200 + status:ok + langgraph:ok)
  #    • LangGraph direct health   — GET <langgraph_url>/health (200 + status:ok)
  # ════════════════════════════════════════════════════════════════════════════
  health-check:
    name: "4 · Health Check (Production Smoke Tests)"
    needs: [deploy-nextjs-do, resolve-urls]
    if: |
      always() &&
      needs.deploy-nextjs-do.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      app_url:      ${{ needs.deploy-nextjs-do.outputs.app_url }}

    steps:
      - name: Wait for App Platform deploy propagation
        run: sleep 30

      - name: Smoke test — Next.js root page
        run: |
          URL="${{ needs.deploy-nextjs-do.outputs.app_url }}"
          echo "Testing: ${URL}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
              echo "✅ Root page returned HTTP ${STATUS}"
              break
            fi
            echo "Attempt ${i}/5 — HTTP ${STATUS} — retrying in 10s..."
            [ "$i" = "5" ] && { echo "❌ Root page health check failed after 5 attempts"; exit 1; }
            sleep 10
          done

      - name: Smoke test — CSRF endpoint
        run: |
          URL="${{ needs.deploy-nextjs-do.outputs.app_url }}/api/auth/csrf"
          for i in 1 2 3 4 5; do
            BODY=$(curl -s --max-time 10 "${URL}" || echo "")
            if echo "$BODY" | grep -q "csrfToken\|token"; then
              echo "✅ CSRF endpoint is healthy"
              break
            fi
            echo "Attempt ${i}/5 — CSRF endpoint not ready — retrying in 10s..."
            [ "$i" = "5" ] && { echo "❌ CSRF endpoint health check failed"; exit 1; }
            sleep 10
          done

      - name: Smoke test — Next.js service health (includes LangGraph connectivity)
        run: |
          # /api/health probes LANGGRAPH_SERVICE_URL internally and returns:
          #   { "status": "ok", "langgraph": "ok" | "unreachable" }
          # A 503 from this endpoint means Next.js cannot reach LangGraph.
          URL="${{ needs.deploy-nextjs-do.outputs.app_url }}/api/health"
          for i in 1 2 3 4 5; do
            BODY=$(curl -s --max-time 10 "${URL}" || echo "")
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}" || echo "000")
            echo "  Attempt ${i}/5 — HTTP ${HTTP} — body: ${BODY}"
            if echo "$BODY" | grep -q '"status":"ok"'; then
              LG_STATUS=$(echo "$BODY" | jq -r '.langgraph // "not_checked"' 2>/dev/null || echo "unknown")
              if [ "$LG_STATUS" = "ok" ]; then
                echo "✅ Next.js is healthy and can reach LangGraph"
                break
              elif [ "$LG_STATUS" = "not_checked" ]; then
                echo "✅ Next.js is healthy (LangGraph probe not available — LANGGRAPH_SERVICE_URL may not be set)"
                break
              else
                echo "⚠️ Next.js is up but cannot reach LangGraph (langgraph=${LG_STATUS})"
                [ "$i" = "5" ] && { echo "❌ Cross-service connectivity check failed after 5 attempts"; exit 1; }
              fi
            else
              [ "$i" = "5" ] && { echo "❌ Next.js /api/health check failed after 5 attempts"; exit 1; }
            fi
            sleep 10
          done

      - name: Smoke test — LangGraph direct /health
        run: |
          # Use the live URL resolved from the DO API, not the static secret
          LG_URL="${{ needs.resolve-urls.outputs.langgraph_url }}"
          if [ -z "$LG_URL" ]; then
            echo "⏭️ LangGraph URL could not be resolved — skipping direct health check"
            exit 0
          fi
          echo "Testing: ${LG_URL}/health"
          for i in 1 2 3 4 5; do
            BODY=$(curl -s --max-time 10 "${LG_URL}/health" || echo "")
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ LangGraph /health → ${BODY}"
              break
            fi
            echo "Attempt ${i}/5 — LangGraph not ready — retrying in 10s..."
            [ "$i" = "5" ] && { echo "❌ LangGraph direct health check failed after 5 attempts"; exit 1; }
            sleep 10
          done

      - name: Write health check summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          {
            echo "## 🩺 Health Check — ${ICON} ${STATUS^}"
            echo ""
            echo "| Endpoint | Check |"
            echo "|----------|-------|"
            echo "| \`GET /\` | Next.js root page — HTTP 200 |"
            echo "| \`GET /api/auth/csrf\` | CSRF token present |"
            echo "| \`GET /api/health\` | status:ok + langgraph:ok (cross-service) |"
            echo "| \`GET <langgraph>/health\` | LangGraph direct — status:ok |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 5 — DAST (OWASP ZAP Full Scan on Production)
  #
  #  Dynamic Application Security Testing against the live production URL.
  #  Runs after a successful health check (confirms the app is ready for scan).
  #
  #  Catches runtime issues that static analysis misses:
  #    • Missing security headers (CSP, HSTS, X-Frame-Options)
  #    • Insecure cookies / session fixation
  #    • CORS misconfiguration + open redirects
  #    • Injection surfaces (header, path, body)
  #    • Information disclosure in error responses
  #
  #  False-positive suppressions: .github/zap/rules.tsv
  #  Skippable via workflow_dispatch.skip_dast=true.
  # ════════════════════════════════════════════════════════════════════════════
  dast:
    name: "5 · DAST — OWASP ZAP (Production)"
    needs: health-check
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_dast != 'true'
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: ZAP Full Scan — ${{ needs.health-check.outputs.app_url }}
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ needs.health-check.outputs.app_url }}
          allow_issue_writing: true
          fail_action: true
          rules_file_name: .github/zap/rules.tsv
          cmd_options: |
            -config globalexcludeurl.url_list.url(0).regex=.*\.map$
            -config globalexcludeurl.url_list.url(1).regex=.*/_next/static/.*
            -config globalexcludeurl.url_list.url(2).regex=.*/api/auth/.*
          artifact_name: zap-production-${{ github.sha }}

      - name: Upload ZAP SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap_scan_report.json
          category: owasp-zap-production
        continue-on-error: true

      - name: Write DAST summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "⚠️")
          {
            echo "## 🕷️ DAST — ${ICON} OWASP ZAP (Production)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Target** | ${{ needs.health-check.outputs.app_url }} |"
            echo "| **Scan type** | Full scan (active + passive) |"
            echo "| **Status** | ${STATUS^} |"
            echo ""
            echo "> Full HTML report in artifact \`zap-production-${{ github.sha }}\`."
            echo "> Findings ≥ WARN are automatically raised as GitHub Issues."
          } >> "$GITHUB_STEP_SUMMARY"

  dast-skipped:
    name: "5 · DAST — SKIPPED"
    needs: health-check
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_dast == 'true'
    steps:
      - name: Log skip reason
        run: |
          {
            echo "## ⏭️ DAST — SKIPPED"
            echo ""
            echo "| Skipped by | Reason |"
            echo "|------------|--------|"
            echo "| @${{ github.actor }} | ${{ github.event.inputs.emergency_reason || 'No reason provided' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  STAGE 6 — RELEASE SUMMARY + GITHUB RELEASE TAG
  #
  #  Runs always (even if earlier stages failed) to produce a complete audit
  #  record of every deployment attempt.
  #
  #  Creates a GitHub Release tag on success so the deployment is linked to
  #  a permanent, browsable release page.
  # ════════════════════════════════════════════════════════════════════════════
  release-summary:
    name: "6 · Release Summary"
    needs: [ai-gate, ai-gate-skipped, infra-apply, docker-push, docker-push-nextjs, wire-services, migrate, deploy-nextjs-do, health-check, dast, dast-skipped]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write    # Required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Download AI gate reports
        uses: actions/download-artifact@v4
        with:
          name: ai-gate-reports-${{ github.sha }}
          path: reports/ai-gate/
        continue-on-error: true   # May not exist if ai-gate was skipped

      - name: Write comprehensive release summary
        run: |
          # Collect job results
          AI_GATE="${{ needs.ai-gate.result }}${{ needs.ai-gate-skipped.result }}"
          INFRA="${{ needs.infra-apply.result }}"
          DOCKER="${{ needs.docker-push.result }}"
          MIGRATE="${{ needs.migrate.result }}"
          RAILWAY_DEPLOY="${{ needs.deploy-nextjs-do.result }}"
          HEALTH="${{ needs.health-check.result }}"
          DAST="${{ needs.dast.result }}${{ needs.dast-skipped.result }}"

          icon() {
            case "$1" in
              success)  echo "✅" ;;
              skipped)  echo "⏭️" ;;
              failure)  echo "❌" ;;
              *)        echo "⚪" ;;
            esac
          }

          # Overall result
          OVERALL="✅ SUCCESS"
          for r in "${{ needs.ai-gate.result }}" "${{ needs.docker-push.result }}" "${{ needs.migrate.result }}" "${{ needs.deploy-nextjs-do.result }}" "${{ needs.health-check.result }}"; do
            if [ "$r" = "failure" ]; then OVERALL="❌ FAILED"; break; fi
          done

          # Read risk score if available
          RISK_SCORE="N/A"
          RISK_APPROVED="N/A"
          if [ -f reports/ai-gate/risk-score.json ]; then
            RISK_SCORE=$(node -e "console.log(require('./reports/ai-gate/risk-score.json').score)" 2>/dev/null || echo "N/A")
            RISK_APPROVED=$(node -e "console.log(require('./reports/ai-gate/risk-score.json').approved)" 2>/dev/null || echo "N/A")
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RELEASE_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          {
            echo "---"
            echo "## 🚀 Release — ${OVERALL}"
            echo ""
            echo "**${RELEASE_TIME}** · Commit [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) · By @${{ github.actor }}"
            echo ""
            echo "---"
            echo ""
            echo "### Pipeline Stages"
            echo ""
            echo "| # | Stage | Status |"
            echo "|---|-------|--------|"
            echo "| 1 | AI Security Gate | $(icon '${{ needs.ai-gate.result }}')$(icon '${{ needs.ai-gate-skipped.result }}') |"
            echo "| 2a | Infrastructure (Terraform) | $(icon '${INFRA}') |"
            echo "| 2b | LangGraph Docker — Build · Trivy · Push | $(icon '${{ needs.docker-push.result }}') |"
            echo "| 2b-NX | Next.js Docker — Build · Trivy · Push | $(icon '${{ needs.docker-push-nextjs.result }}') |"
            echo "| 2c | Database Migration | $(icon '${{ needs.migrate.result }}') |"
            echo "| 3 | Deploy → DO App Platform (Next.js) | $(icon '${{ needs.deploy-nextjs-do.result }}') |"
            echo "| 4 | Health Check | $(icon '${{ needs.health-check.result }}') |"
            echo "| 5 | DAST (OWASP ZAP) | $(icon '${{ needs.dast.result }}')$(icon '${{ needs.dast-skipped.result }}') |"
            echo ""
            echo "---"
            echo ""
            echo "### AI Security Gate"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Risk score** | ${RISK_SCORE} / 100 |"
            echo "| **Approved** | ${RISK_APPROVED} |"
            echo "| **Threshold** | ${{ env.RISK_THRESHOLD }} |"
            echo ""
            echo "---"
            echo ""
            echo "### Deployment Targets"
            echo ""
            echo "| Service | Platform | URL |"
            echo "|---------|----------|-----|"
            echo "| Next.js app | DO App Platform | ${{ needs.deploy-nextjs-do.outputs.app_url }} |"
            echo "| LangGraph service | DO App Platform | (see infra outputs) |"
            echo "| LangGraph image | DOCR | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}\` |"
            echo "| Next.js image | DOCR | \`registry.digitalocean.com/${{ env.DOCR_REGISTRY_NAME }}/${{ env.NEXTJS_IMAGE_NAME }}:sha-${SHORT_SHA}\` |"
            echo ""
            echo "---"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "| Artifact | Retention |"
            echo "|----------|-----------|"
            echo "| \`ai-gate-reports-${{ github.sha }}\` | 30 days |"
            echo "| \`zap-production-${{ github.sha }}\` | (ZAP report) |"
            echo ""
            echo "> Run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      # Create a GitHub Release tag on full success
      - name: Create GitHub Release
        if: |
          needs.deploy-nextjs-do.result == 'success' &&
          needs.health-check.result == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha      = context.sha;
            const shortSha = sha.substring(0, 7);
            const now      = new Date().toISOString().replace('T',' ').substring(0,16) + ' UTC';
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            await github.rest.repos.createRelease({
              owner:            context.repo.owner,
              repo:             context.repo.repo,
              tag_name:         `release-${shortSha}`,
              name:             `Release ${shortSha} — ${now}`,
              target_commitish: sha,
              body: [
                `## 🚀 Production Release`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Commit** | \`${shortSha}\` |`,
                `| **Deployed by** | @${{ github.actor }} |`,
                `| **Deployed at** | ${now} |`,
                `| **Run** | [#${{ github.run_number }}](${runUrl}) |`,
                ``,
                `### What's included`,
                `- ✅ AI Security Gate passed`,
                `- 🐳 LangGraph + Next.js images pushed to DOCR`,
                `- 🗄️ Database migrations applied`,
                `- 🚀 Next.js deployed on DigitalOcean App Platform`,
                `- 🩺 Health checks passed`,
              ].join('\n'),
              draft:      false,
              prerelease: false,
              make_latest: 'true',
            });
