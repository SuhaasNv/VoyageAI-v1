name: CodeQL

# Runs on every PR and push to main, plus a weekly scheduled scan.
# CodeQL detects security vulnerabilities (injection, auth bypass, XSS, etc.)
# and posts findings directly to the GitHub Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 10:00 UTC — catches new advisories against existing code
    - cron: "0 10 * * 1"

jobs:
  analyze:
    name: "🛡️ CodeQL Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload SARIF results

    strategy:
      fail-fast: false
      matrix:
        # javascript-typescript covers both .js and .ts/.tsx files
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended adds more queries beyond the defaults,
          # covering OWASP Top 10 and common Node.js/Next.js patterns.
          queries: security-extended
          config: |
            paths-ignore:
              - node_modules
              - .next
              - prisma/migrations

      - name: Autobuild
        # CodeQL's autobuild handles TypeScript/Next.js automatically.
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          # Upload results even if analysis found issues, so they appear in
          # the Security tab rather than only failing the check.
          upload: always
