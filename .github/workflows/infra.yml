name: Infrastructure — DigitalOcean (Terraform)

# ─────────────────────────────────────────────────────────────────────────────
#  Manages all DigitalOcean infrastructure for VoyageAI via Terraform.
#
#  Resources provisioned:
#    • DigitalOcean Project           — groups all resources for billing
#    • Container Registry (DOCR)      — stores the voyageai-langgraph image
#    • App Platform service           — runs the LangGraph Python sidecar
#    • Monitor alert policies         — CPU/memory spike notifications
#
#  Job flow:
#
#    PR to main:
#      validate → plan  (plan posted as PR comment)
#
#    Push to main (after merge):
#      validate → plan → apply  (outputs written to GitHub step summary)
#
#    Manual (workflow_dispatch):
#      action=plan    → validate → plan
#      action=apply   → validate → plan → apply
#      action=destroy → validate → destroy  (requires confirm_destroy="destroy")
#
#  Required GitHub Secrets:
#    DIGITALOCEAN_ACCESS_TOKEN  — DO API token (write:registry + app platform)
#    DO_SPACES_ACCESS_KEY       — Spaces access key (for Terraform state bucket)
#    DO_SPACES_SECRET_KEY       — Spaces secret key (for Terraform state bucket)
#    TF_VAR_next_internal_url   — Vercel production URL (e.g. https://voyageai.vercel.app)
#    TF_VAR_internal_agent_secret — Shared secret for Next.js ↔ LangGraph auth
#
#  Optional GitHub Secrets / Variables:
#    DO_SPACES_REGION           — Spaces region (default: nyc3)
#    TF_VAR_alert_email         — Email for infrastructure alerts
#    TF_VAR_region              — DO region (default: nyc3)
#    TF_VAR_environment         — staging | production (default: production)
#    TF_VAR_langgraph_image_tag — Image tag to deploy (default: latest)
#
#  One-time bootstrap (run locally before first CI run):
#    doctl spaces create voyageai-tfstate --region nyc3
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options: [staging, production]
      confirm_destroy:
        description: "Type 'destroy' to confirm infrastructure teardown (required for destroy action)"
        required: false
        default: ""

# Never run two infra workflows in parallel — Terraform state locking handles
# concurrent runs, but double-applies are confusing and dangerous.
concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: "1.8.5"
  TF_WORKING_DIR: infra
  # DigitalOcean Spaces backend config
  DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION || 'nyc3' }}
  TF_BACKEND_BUCKET: voyageai-tfstate
  # Pass DO token to both Terraform provider and doctl
  DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
  # All TF_VAR_* are automatically picked up by Terraform as input variables
  TF_VAR_do_token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
  TF_VAR_next_internal_url: ${{ secrets.TF_VAR_next_internal_url }}
  TF_VAR_internal_agent_secret: ${{ secrets.TF_VAR_internal_agent_secret }}
  TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email || '' }}
  TF_VAR_environment: ${{ github.event.inputs.environment || 'production' }}
  TF_IN_AUTOMATION: "true"    # Suppress interactive prompts in Terraform output
  TF_CLI_ARGS_plan: "-lock-timeout=60s"
  TF_CLI_ARGS_apply: "-lock-timeout=60s"

defaults:
  run:
    shell: bash
    working-directory: infra

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════════════════
  #  VALIDATE
  #  • terraform fmt   — enforces canonical formatting (fails on drift)
  #  • terraform init  — initialises providers + remote backend
  #  • terraform validate — checks syntax and internal consistency
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    # Skip destroy-only runs; validate is implied by the destroy job's own init
    if: github.event.inputs.action != 'destroy'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt — check canonical formatting
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true   # Report but don't block — fmt errors are cosmetic

      - name: terraform init
        id: init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}" \
            -backend-config="endpoint=https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com" \
            -input=false

      - name: terraform validate
        id: validate
        run: terraform validate -no-color

      # Post formatting issues as a PR annotation (cosmetic — never blocks)
      - name: Annotate fmt issues on PR
        if: steps.fmt.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '> ⚠️ **Terraform fmt** found formatting issues in `infra/`. Run `terraform fmt -recursive infra/` locally and commit the result.'
            })

      # Cache the .terraform directory so plan/apply don't re-download providers
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_WORKING_DIR }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-

  # ════════════════════════════════════════════════════════════════════════════
  #  PLAN
  #  Generates a Terraform execution plan and:
  #    • Saves it as a binary artifact (used by the apply job — no re-plan)
  #    • Posts a readable diff as a PR comment (on pull_request events)
  #    • Writes a summary to the GitHub Actions step summary
  # ════════════════════════════════════════════════════════════════════════════
  plan:
    name: "📋 Plan"
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.action != 'destroy' || github.event.inputs.action == ''
    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore provider cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_WORKING_DIR }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: terraform init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}" \
            -backend-config="endpoint=https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com" \
            -input=false

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan.binary \
            -input=false \
            -no-color \
            -detailed-exitcode 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        # Exit codes: 0 = no changes, 1 = error, 2 = changes pending
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      # Convert binary plan to human-readable JSON for the PR comment
      - name: terraform show (readable plan)
        id: show
        run: terraform show -no-color tfplan.binary > plan-readable.txt

      # ── Post plan as PR comment ─────────────────────────────────────────
      - name: Post plan comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('infra/plan-readable.txt', 'utf8');
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const icon  = exitcode === '0' ? '✅' : exitcode === '2' ? '⚠️' : '❌';
            const label = exitcode === '0' ? 'No changes' : exitcode === '2' ? 'Changes pending' : 'Error';

            // Find and delete any previous plan comment from this workflow
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('## 🏗️ Terraform Plan')) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
              }
            }

            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated — see full plan in Actions run)' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `## 🏗️ Terraform Plan — ${icon} ${label}`,
                '',
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Environment** | \`${{ env.TF_VAR_environment }}\` |`,
                `| **Commit** | \`${{ github.sha }}\` |`,
                `| **Exit code** | \`${exitcode}\` |`,
                '',
                '<details><summary>Show Plan</summary>',
                '',
                '```hcl',
                truncated,
                '```',
                '',
                '</details>',
              ].join('\n')
            });

      # Upload the binary plan — apply job uses this exact plan (no re-plan)
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: |
            infra/tfplan.binary
            infra/plan-readable.txt
          retention-days: 1

      - name: Write plan summary
        run: |
          EXITCODE="${{ steps.plan.outputs.exitcode }}"
          ICON=$([ "$EXITCODE" = "0" ] && echo "✅" || ([ "$EXITCODE" = "2" ] && echo "⚠️" || echo "❌"))
          LABEL=$([ "$EXITCODE" = "0" ] && echo "No changes" || ([ "$EXITCODE" = "2" ] && echo "Changes pending" || echo "Error"))
          {
            echo "## 🏗️ Terraform Plan — ${ICON} ${LABEL}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Environment** | \`${{ env.TF_VAR_environment }}\` |"
            echo "| **Region** | \`${{ env.DO_SPACES_REGION }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo '```'
            tail -20 plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  APPLY
  #  Applies the exact binary plan from the plan job — no second plan run.
  #  Only runs on push to main or manual workflow_dispatch with action=apply.
  #  Posts the Terraform outputs (registry URL, app URL) to the step summary.
  # ════════════════════════════════════════════════════════════════════════════
  apply:
    name: "🚀 Apply"
    needs: plan
    runs-on: ubuntu-latest
    environment: production       # Requires manual approval in GitHub Environments
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Restore provider cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TF_WORKING_DIR }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: terraform init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}" \
            -backend-config="endpoint=https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com" \
            -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: infra/

      - name: terraform apply (saved plan)
        id: apply
        run: terraform apply -input=false -no-color tfplan.binary

      # Capture outputs so they can be shown in the summary + used downstream
      - name: Capture terraform outputs
        id: outputs
        run: |
          REGISTRY=$(terraform output -raw registry_endpoint 2>/dev/null || echo "N/A")
          APP_URL=$(terraform output -raw langgraph_live_url 2>/dev/null || echo "N/A")
          VERCEL_HINT=$(terraform output -raw vercel_env_hint 2>/dev/null || echo "N/A")
          echo "registry=${REGISTRY}"       >> "$GITHUB_OUTPUT"
          echo "app_url=${APP_URL}"          >> "$GITHUB_OUTPUT"
          echo "vercel_hint=${VERCEL_HINT}"  >> "$GITHUB_OUTPUT"

      - name: Write apply summary
        run: |
          {
            echo "## 🏗️ Terraform Apply — ✅ Infrastructure Updated"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| **Container Registry** | \`${{ steps.outputs.outputs.registry }}\` |"
            echo "| **LangGraph App URL** | \`${{ steps.outputs.outputs.app_url }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Applied by** | @${{ github.actor }} |"
            echo ""
            echo "### Next step"
            echo "Add the following to your **Vercel project environment variables**:"
            echo ""
            echo '```'
            echo "${{ steps.outputs.outputs.vercel_hint }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════════════
  #  DESTROY
  #  Tears down ALL DigitalOcean infrastructure.
  #  Manual only (workflow_dispatch with action=destroy).
  #  Requires typing "destroy" in the confirm_destroy input.
  #  ⚠️  This CANNOT be undone — deleting the registry also deletes all images.
  # ════════════════════════════════════════════════════════════════════════════
  destroy:
    name: "💣 Destroy (manual only)"
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'destroy'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.DO_SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.DO_SPACES_SECRET_KEY }}" \
            -backend-config="endpoint=https://${{ env.DO_SPACES_REGION }}.digitaloceanspaces.com" \
            -input=false

      # Temporarily remove prevent_destroy from the registry before destroying.
      # The lifecycle block is a Terraform meta-argument — it cannot be overridden
      # via -target, so we patch the file inline for the destroy run only.
      - name: Patch registry lifecycle for destroy
        run: |
          sed -i 's/prevent_destroy = true/prevent_destroy = false/' registry.tf

      - name: terraform destroy
        run: terraform destroy -auto-approve -input=false -no-color

      - name: Write destroy summary
        if: always()
        run: |
          {
            echo "## 💣 Terraform Destroy — ⚠️ Infrastructure Removed"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Environment** | \`${{ env.TF_VAR_environment }}\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "> All DigitalOcean resources (registry, app, project) have been destroyed."
            echo "> Remember to remove \`LANGGRAPH_SERVICE_URL\` from the Vercel project settings."
          } >> "$GITHUB_STEP_SUMMARY"
