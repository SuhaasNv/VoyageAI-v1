
global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alert rules
  scrape_timeout:      10s

  external_labels:
    env: production
    app: voyageai

# ── Alert rule files ──────────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Next.js application ─────────────────────────────────────────────────────
  # NEXTJS_PROD_HOST is substituted by the deploy workflow (deploy-monitoring.yml).
  # For local dev, replace with host.docker.internal:3000 and remove scheme/auth.
  - job_name: nextjs
    metrics_path: /api/metrics
    scheme: https
    authorization:
      credentials: "${METRICS_SCRAPE_SECRET}"
    static_configs:
      - targets: ["NEXTJS_PROD_HOST:443"]
        labels:
          service: nextjs
          env: production

  # ── Python LangGraph service ─────────────────────────────────────────────────
  # LANGGRAPH_PROD_HOST is substituted by the deploy workflow.
  - job_name: langgraph
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ["LANGGRAPH_PROD_HOST:443"]
        labels:
          service: langgraph
          env: production

  # ── Node exporter (host system metrics: CPU / Memory / Disk) ────────────────
  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host

  # ── PostgreSQL exporter ──────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
