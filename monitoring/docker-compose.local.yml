# Local dev override — swaps production prometheus.yml for the local one.
#
# Usage:
#   cd monitoring
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# This overrides only the Prometheus config volume so it uses
# host.docker.internal:3000/8000 to reach Next.js and LangGraph running
# on the host machine (via npm run dev / python uvicorn).

services:
  prometheus:
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
